<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Hydrogen Fuel Cell — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--panel:rgba(16,28,46,.55)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:20px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .typetoggle{position:fixed;top:46px;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;backdrop-filter:blur(14px)}
  .typetoggle button{font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--dim);background:transparent;border:0;border-radius:8px;padding:7px 13px;cursor:pointer}
  .typetoggle button.on{background:var(--teal);color:#04302c}
  .info{position:fixed;top:96px;right:14px;z-index:9;width:min(238px,54vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .eq{font-size:12px;margin-top:9px;padding:8px 10px;border-radius:9px;line-height:1.5}.eq:first-child{margin-top:0}
  .eq.an{background:rgba(120,180,255,.14)}.eq.ca{background:rgba(255,143,107,.14)}.eq b{font-family:'Fraunces',serif}
  .eq .h{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim)}
  .note{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px clamp(14px,5vw,60px) calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .wrap2 .name{flex:0 0 110px;font-weight:600;font-size:14px}
  .wrap2 input{flex:1;accent-color:var(--amber);height:28px}
  .wrap2 .val{flex:0 0 70px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--amber)}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
  body.preview .back,body.preview .title,body.preview .typetoggle,body.preview .info,body.preview .ctrl,body.preview .zoom{display:none!important}
  .zoom{position:fixed;left:16px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:10;display:flex;flex-direction:column;gap:8px}
  .zoom button{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:20px;cursor:pointer;backdrop-filter:blur(8px)}
</style>
</head>
<body>
  <div id="loader">priming the fuel cell…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="index.html">← Dabble</a>
  <div class="title">⚡ Hydrogen Fuel Cell</div>
  <div class="typetoggle">
    <button id="t-cell" class="on" onclick="setView('cell')">⚗️ The cell</button>
    <button id="t-car" onclick="setView('car')">🚗 In a car</button>
  </div>
  <div class="info">
    <div class="eq an"><span class="h">Negative electrode (anode) — H₂ side</span><br><b>2H₂ → 4H⁺ + 4e⁻</b></div>
    <div class="eq ca"><span class="h">Positive electrode (cathode) — O₂ side</span><br><b>O₂ + 4H⁺ + 4e⁻ → 2H₂O</b></div>
    <div class="note" id="o-note"></div>
  </div>
  <div class="zoom"><button onclick="zoom(0.85)">+</button><button onclick="zoom(1.18)">−</button></div>
  <div class="ctrl"><div class="wrap2"><span class="name">Fuel flow / load</span><input type="range" id="flow" min="1" max="10" step="1" value="6" oninput="upd()"><span class="val" id="flow-v">medium</span></div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
const __err=m=>{const l=document.getElementById('loader');if(l){l.style.opacity=1;l.textContent=String(m).slice(0,150);l.style.color='#ff9a8a';}};
window.addEventListener('error',e=>__err('ERR: '+(e.message||e.error)));
import * as THREE from 'three';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));const rnd=(a,b)=>a+Math.random()*(b-a);
const PREVIEW=new URLSearchParams(location.search).has('preview');if(PREVIEW)document.body.classList.add('preview');
const canvas=$('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x16283e,130,280);
const camera=new THREE.PerspectiveCamera(50,1,0.1,500);
(()=>{const c=document.createElement('canvas');c.width=8;c.height=256;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#24405c');gr.addColorStop(.6,'#15293f');gr.addColorStop(1,'#0c1b2c');g.fillStyle=gr;g.fillRect(0,0,8,256);scene.background=new THREE.CanvasTexture(c);})();
scene.add(new THREE.HemisphereLight(0xcfe6ff,0x202a38,.9));
const key=new THREE.DirectionalLight(0xffffff,1.05);key.position.set(16,32,22);scene.add(key);scene.add(new THREE.AmbientLight(0xffffff,.35));
function label(text,x,y,z,col,parent){const t=document.createElement('canvas').getContext('2d');t.font='600 30px Hanken Grotesk,sans-serif';const w=Math.ceil(t.measureText(text).width)+24;const c=document.createElement('canvas');c.width=w;c.height=46;const g=c.getContext('2d');g.font='600 30px Hanken Grotesk,sans-serif';g.fillStyle=col;g.textAlign='center';g.textBaseline='middle';g.fillText(text,w/2,25);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,depthTest:false}));s.scale.set(2*w/46,2,1);s.position.set(x,y,z);(parent||scene).add(s);return s;}

// ===== CELL VIEW =====
const cellRoot=new THREE.Group();scene.add(cellRoot);
const eMat=new THREE.MeshStandardMaterial({color:0x4a5562,roughness:.85,metalness:.2});
const EX=7,EW=2.4,EHt=18,EDp=13;
const anode=new THREE.Mesh(new THREE.BoxGeometry(EW,EHt,EDp),eMat);anode.position.set(-EX,0,0);cellRoot.add(anode);
const cathode=new THREE.Mesh(new THREE.BoxGeometry(EW,EHt,EDp),eMat);cathode.position.set(EX,0,0);cellRoot.add(cathode);
const mem=new THREE.Mesh(new THREE.BoxGeometry(3.2,EHt,EDp),new THREE.MeshStandardMaterial({color:0x9fd0e0,transparent:true,opacity:.22,roughness:.2}));cellRoot.add(mem);
const chMat=ch=>new THREE.MeshStandardMaterial({color:ch,transparent:true,opacity:.10,side:THREE.DoubleSide});
const hCh=new THREE.Mesh(new THREE.BoxGeometry(7,EHt+2,EDp+2),chMat(0xbfe2f0));hCh.position.set(-EX-4.5,0,0);cellRoot.add(hCh);
const oCh=new THREE.Mesh(new THREE.BoxGeometry(7,EHt+2,EDp+2),chMat(0xffd0c0));oCh.position.set(EX+4.5,0,0);cellRoot.add(oCh);
const pipeMat=new THREE.MeshStandardMaterial({color:0x55626f,roughness:.7});
function pipe(x,y,len,horiz){const m=new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.1,len,16),pipeMat);m.position.set(x,y,0);if(horiz)m.rotation.z=Math.PI/2;cellRoot.add(m);}
pipe(-EX-11,9,8,true);pipe(EX+11,9,8,true);pipe(EX+9,-11,8,false);
const aT=new THREE.Vector3(-EX,EHt/2,0),cT=new THREE.Vector3(EX,EHt/2,0),top=22;
const path=[aT,new THREE.Vector3(-EX,top,0),new THREE.Vector3(0,top,0),new THREE.Vector3(EX,top,0),cT];
cellRoot.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(path),new THREE.LineBasicMaterial({color:0xbfc8d2})));
const bulb=new THREE.Mesh(new THREE.SphereGeometry(2.2,20,16),new THREE.MeshStandardMaterial({color:0xfff3c0,emissive:0xffd84a,emissiveIntensity:0}));bulb.position.set(0,top,0);cellRoot.add(bulb);
const bulbLight=new THREE.PointLight(0xffe08a,0,60,2);bulbLight.position.set(0,top,0);cellRoot.add(bulbLight);
const glow=new THREE.Mesh(new THREE.SphereGeometry(3.6,16,12),new THREE.MeshBasicMaterial({color:0xffe27a,transparent:true,opacity:0}));glow.position.set(0,top,0);cellRoot.add(glow);
function alongPath(p,t){const seg=p.length-1,f=t*seg,i=Math.min(seg-1,Math.floor(f));return p[i].clone().lerp(p[i+1],f-i);}
label('H₂ in',-EX-13,12.5,0,'#bfe2f0',cellRoot);label('O₂ in (air)',EX+13,12.5,0,'#ffd0c0',cellRoot);label('H₂O out',EX+13,-13,0,'#9fd0ff',cellRoot);
label('− anode',-EX,-EHt/2-3,0,'#9fc4ff',cellRoot);label('+ cathode',EX,-EHt/2-3,0,'#ff8f6b',cellRoot);label('electrolyte / membrane',0,-EHt/2-3,0,'#bfe2f0',cellRoot);label('bulb',0,top+4,0,'#ffe08a',cellRoot);
const SH=new THREE.SphereGeometry(.7,10,8),SO=new THREE.SphereGeometry(.95,10,8),SP=new THREE.SphereGeometry(.55,8,8),SE=new THREE.SphereGeometry(.45,8,8),SW=new THREE.SphereGeometry(.7,8,8);
const mH=new THREE.MeshStandardMaterial({color:0xf2f6ff,roughness:.4}),mO=new THREE.MeshStandardMaterial({color:0xff6b5a,roughness:.4}),mP=new THREE.MeshStandardMaterial({color:0xffe08a,emissive:0x6a5210,emissiveIntensity:.6}),mE=new THREE.MeshBasicMaterial({color:0x9fe0ff}),mW=new THREE.MeshStandardMaterial({color:0x6fb6ff,transparent:true,opacity:.85,roughness:.2});
function h2(){const g=new THREE.Group();const a=new THREE.Mesh(SH,mH),b=new THREE.Mesh(SH,mH);a.position.x=-.6;b.position.x=.6;g.add(a);g.add(b);return g;}
function o2(){const g=new THREE.Group();const a=new THREE.Mesh(SO,mO),b=new THREE.Mesh(SO,mO);a.position.x=-.8;b.position.x=.8;g.add(a);g.add(b);return g;}
let h2s=[],o2s=[],hp=[],water=[],accH=0,accO=0;
const elec=[];for(let i=0;i<12;i++){const m=new THREE.Mesh(SE,mE);cellRoot.add(m);elec.push(m);}

// ===== CAR VIEW =====
const carRoot=new THREE.Group();scene.add(carRoot);carRoot.visible=false;
const road=new THREE.Mesh(new THREE.BoxGeometry(160,1,34),new THREE.MeshStandardMaterial({color:0x29333f,roughness:.97}));road.position.y=-11.1;carRoot.add(road);
const dashes=[];for(let i=0;i<10;i++){const d=new THREE.Mesh(new THREE.BoxGeometry(7,0.2,1.5),new THREE.MeshStandardMaterial({color:0xccd5df}));d.position.set(-63+i*14,-10.5,0);carRoot.add(d);dashes.push(d);}
const bodyMat=new THREE.MeshStandardMaterial({color:0x2ec4b6,roughness:.26,metalness:.6});
const RW=3.8;const prof=new THREE.Shape();
prof.moveTo(-15,-7);
prof.lineTo(-9-RW,-7);prof.absarc(-9,-7,RW,Math.PI,0,true);
prof.lineTo(9-RW,-7);prof.absarc(9,-7,RW,Math.PI,0,true);
prof.lineTo(14.5,-7);prof.lineTo(15,-4.6);
prof.quadraticCurveTo(14.3,-2.4,11,-2);prof.lineTo(6.2,-1.7);
prof.quadraticCurveTo(3.6,-1.5,2,2.2);prof.quadraticCurveTo(0.6,4.3,-3,4.4);
prof.lineTo(-7,4.0);prof.quadraticCurveTo(-11,3.6,-12.8,0.2);
prof.quadraticCurveTo(-14.6,-1.6,-15,-3.2);prof.lineTo(-15,-7);
const bgeo=new THREE.ExtrudeGeometry(prof,{depth:11,bevelEnabled:true,bevelThickness:0.9,bevelSize:0.9,bevelSegments:4,steps:1});bgeo.translate(0,0,-5.5);
carRoot.add(new THREE.Mesh(bgeo,bodyMat));
const trim=new THREE.Mesh(new THREE.BoxGeometry(30,0.5,11.6),new THREE.MeshStandardMaterial({color:0x15303a,metalness:.4,roughness:.5}));trim.position.set(0,-2.3,0);carRoot.add(trim);
const winMat=new THREE.MeshStandardMaterial({color:0x0e1a24,roughness:.06,metalness:.75});
[5.62,-5.62].forEach(function(z){const w=new THREE.Mesh(new THREE.BoxGeometry(8.6,2.5,0.25),winMat);w.position.set(-2.6,2.95,z);carRoot.add(w);});
const wsh=new THREE.Mesh(new THREE.BoxGeometry(0.25,3.1,9.9),winMat);wsh.position.set(2.7,1.2,0);wsh.rotation.z=0.92;carRoot.add(wsh);
[4,-4].forEach(function(z){const hl=new THREE.Mesh(new THREE.BoxGeometry(0.5,1.0,1.9),new THREE.MeshStandardMaterial({color:0xfff7d0,emissive:0xffe27a,emissiveIntensity:1}));hl.position.set(14.8,-3.3,z);carRoot.add(hl);
  const tl=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.9,1.9),new THREE.MeshStandardMaterial({color:0xff5a5a,emissive:0x8a1414,emissiveIntensity:1}));tl.position.set(-15,-3.3,z);carRoot.add(tl);});
const wMat=new THREE.MeshStandardMaterial({color:0x14171c,roughness:.85});
function makeWheel(){const g=new THREE.Group();
  const tire=new THREE.Mesh(new THREE.CylinderGeometry(3.6,3.6,2.8,30),wMat);tire.rotation.x=Math.PI/2;g.add(tire);
  const rim=new THREE.Mesh(new THREE.CylinderGeometry(2.1,2.1,3.0,26),new THREE.MeshStandardMaterial({color:0xccd6e0,metalness:.9,roughness:.18}));rim.rotation.x=Math.PI/2;g.add(rim);
  for(let i=0;i<7;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(0.45,3.6,1.1),new THREE.MeshStandardMaterial({color:0x9aa6b2,metalness:.78,roughness:.26}));s.rotation.z=i/7*Math.PI*2;g.add(s);}
  return g;}
const wheels=[];[[9,5.7],[9,-5.7],[-9,5.7],[-9,-5.7]].forEach(function(p){const w=makeWheel();w.position.set(p[0],-7,p[1]);carRoot.add(w);wheels.push(w);});
const tank=new THREE.Mesh(new THREE.CapsuleGeometry(1.7,8,8,14),new THREE.MeshStandardMaterial({color:0xbfe2f0,metalness:.5,roughness:.3}));tank.rotation.z=Math.PI/2;tank.position.set(3,-8.7,0);carRoot.add(tank);
const fcbox=new THREE.Mesh(new THREE.BoxGeometry(6,2.6,8),new THREE.MeshStandardMaterial({color:0x3a8a82,roughness:.5,emissive:0x12504a,emissiveIntensity:.55}));fcbox.position.set(-5,-8.7,0);carRoot.add(fcbox);
const csh=new THREE.Mesh(new THREE.CircleGeometry(16,32),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.3}));csh.rotation.x=-Math.PI/2;csh.position.set(0,-10.4,0);csh.scale.set(1,0.4,1);carRoot.add(csh);
label('H₂ tank',6,-11.8,8.5,'#bfe2f0',carRoot);label('fuel cell',-6,-11.8,8.5,'#9fd0ff',carRoot);label('electric motor → wheels turn',13,-13.2,0,'#ffe08a',carRoot);label('💧 water exhaust',-18,-6,0,'#9fd0ff',carRoot);
let exhaust=[];
function spawnExhaust(){const m=new THREE.Mesh(SW,mW);m.position.set(-13,rnd(-7,-5),rnd(-3,3));carRoot.add(m);exhaust.push(m);}

let mode='cell';
function setView(v){mode=v;$('t-cell').classList.toggle('on',v==='cell');$('t-car').classList.toggle('on',v==='car');cellRoot.visible=v==='cell';carRoot.visible=v==='car';
  $('o-note').innerHTML=v==='cell'
   ?'Hydrogen is oxidised, releasing <b>electrons</b> that flow round the circuit (powering the bulb). The <b>H⁺ ions cross the membrane</b>. The <b>only product is water</b> — clean energy.'
   :'🚗 In a car the fuel cell turns <b>H₂ + O₂ → electricity</b> that drives the <b>electric motor</b>, so the wheels turn. The <b>only thing out of the exhaust is water</b> — no CO₂. (Used in hydrogen cars & buses.)';
  orbit.tgt.set(0,v==='car'?-3:3,0);applyCam();}
window.setView=setView;
function upd(){const f=+$('flow').value;$('flow-v').textContent=f<=3?'low':f<=7?'medium':'high';}
window.upd=upd;
const orbit={th:0.4,ph:1.15,R:78,tgt:new THREE.Vector3(0,3,0)};
function applyCam(){const s=orbit;camera.position.set(s.tgt.x+s.R*Math.sin(s.ph)*Math.sin(s.th),s.tgt.y+s.R*Math.cos(s.ph),s.tgt.z+s.R*Math.sin(s.ph)*Math.cos(s.th));camera.lookAt(s.tgt);}
window.zoom=f=>{orbit.R=clamp(orbit.R*f,42,150);applyCam();};
let drag=false,px=0,py=0;
canvas.addEventListener('pointerdown',e=>{drag=true;px=e.clientX;py=e.clientY;});
addEventListener('pointerup',()=>drag=false);
addEventListener('pointermove',e=>{if(!drag)return;orbit.th-=(e.clientX-px)*0.008;orbit.ph=clamp(orbit.ph-(e.clientY-py)*0.008,0.3,1.5);px=e.clientX;py=e.clientY;applyCam();});
canvas.addEventListener('wheel',e=>{e.preventDefault();window.zoom(e.deltaY>0?1.08:0.92);},{passive:false});
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);resize();applyCam();
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;const f=+$('flow').value;
  if(mode==='cell'){
    const lit=f/10;bulb.material.emissiveIntensity=0.15+1.3*lit;bulbLight.intensity=lit*2.2;glow.material.opacity=0.05+0.3*lit;
    accH+=dt*f*0.8;while(accH>=1){accH-=1;if(h2s.length<40){const g=h2();g.position.set(-EX-13,rnd(-7,7),rnd(-5,5));cellRoot.add(g);h2s.push(g);}}
    for(let i=h2s.length-1;i>=0;i--){const g=h2s[i];g.position.x+=dt*8;g.rotation.y+=dt*3;if(g.position.x>=-EX-1.2){cellRoot.remove(g);h2s.splice(i,1);for(let k=0;k<2;k++){const p=new THREE.Mesh(SP,mP);p.position.set(-EX+1.4,g.position.y+(k?0.6:-0.6),g.position.z);cellRoot.add(p);hp.push({m:p,t:0});}}}
    for(let i=hp.length-1;i>=0;i--){const o=hp[i];o.t+=dt*(0.4+f*0.05);o.m.position.x=-EX+1.4+(EX-1.4-(-EX+1.4))*o.t;o.m.position.y+=Math.sin(now/300+i)*0.3;if(o.t>=1){cellRoot.remove(o.m);hp.splice(i,1);if(Math.random()<0.5){const w=new THREE.Mesh(SW,mW);w.position.set(EX+1.5,rnd(-6,2),rnd(-4,4));cellRoot.add(w);water.push(w);}}}
    accO+=dt*f*0.45;while(accO>=1){accO-=1;if(o2s.length<26){const g=o2();g.position.set(EX+13,rnd(-7,7),rnd(-5,5));cellRoot.add(g);o2s.push(g);}}
    for(let i=o2s.length-1;i>=0;i--){const g=o2s[i];g.position.x-=dt*7;g.rotation.y+=dt*2;if(g.position.x<=EX+1.4){cellRoot.remove(g);o2s.splice(i,1);}}
    for(let i=water.length-1;i>=0;i--){const w=water[i];w.position.y-=dt*6;w.position.x+=dt*4;if(w.position.y<-13){cellRoot.remove(w);water.splice(i,1);}}
    elec.forEach((m,i)=>{const t=((now/1000*f*0.13)+i/12)%1;m.position.copy(alongPath(path,t));});
  }else{
    wheels.forEach(w=>{w.rotation.z-=dt*f*1.3;});
    fcbox.material.emissiveIntensity=0.2+0.06*f;
    for(let i=0;i<dashes.length;i++){dashes[i].position.x-=dt*f*7;if(dashes[i].position.x<-70)dashes[i].position.x+=140;}
    if(Math.random()<dt*f*1.2)spawnExhaust();
    for(let i=exhaust.length-1;i>=0;i--){const e=exhaust[i];e.position.x-=dt*(8+f);e.position.y-=dt*2;if(e.position.x<-40||e.position.y<-13){carRoot.remove(e);exhaust.splice(i,1);}}
  }
  if(!drag)orbit.th+=dt*0.16;applyCam();
  renderer.render(scene,camera);requestAnimationFrame(loop);}
setView('cell');upd();requestAnimationFrame(loop);
setTimeout(()=>$('loader').classList.add('hide'),500);
</script>
</body>
</html>

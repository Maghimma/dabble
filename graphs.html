<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Graph Transformations — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--panel:rgba(16,28,46,.6)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .typetoggle{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;backdrop-filter:blur(14px)}
  .typetoggle button{font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--dim);background:transparent;border:0;border-radius:8px;padding:7px 16px;cursor:pointer}
  .typetoggle button.on{background:var(--teal);color:#04302c}
  .info{position:fixed;top:104px;right:14px;z-index:9;width:min(232px,52vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .eq{font-family:'Fraunces',serif;font-size:21px;text-align:center;color:var(--teal)}
  .rr{display:flex;justify-content:space-between;font-size:13px;margin-top:8px}.rr .v{font-family:'Fraunces',serif;font-weight:600}
  .note{font-size:11.5px;color:var(--dim);line-height:1.55;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:14px clamp(14px,5vw,60px) calc(16px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:680px;margin:0 auto}
  .row{display:flex;align-items:center;gap:14px;margin-top:9px}.row:first-child{margin-top:0}
  .row .name{flex:0 0 150px;font-weight:600;font-size:14px}.row .name b{color:var(--teal);font-family:Fraunces}
  .row input{flex:1;accent-color:var(--teal);height:28px}
  .row .val{flex:0 0 50px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--teal)}
  .pair{display:none}.pair.on{display:block}
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <a class="back" href="index.html">← Dabble</a>
  <div class="title">📈 Graph Transformations</div>
  <div class="typetoggle">
    <button id="t-lin" class="on" onclick="setType('lin')">Linear</button>
    <button id="t-quad" onclick="setType('quad')">Quadratic</button>
  </div>
  <div class="info">
    <div class="eq" id="o-eq">y = x²</div>
    <div id="o-stats"></div>
    <div class="note" id="o-note">The faint grey curve is the <b>parent</b> graph. Move the sliders to stretch and shift it.</div>
  </div>
  <div class="ctrl"><div class="wrap2">
    <div class="pair" id="p-quad">
      <div class="row"><span class="name">stretch <b>a</b></span><input type="range" id="a" min="-3" max="3" step="0.1" value="1" oninput="draw()"><span class="val" id="a-v">1</span></div>
      <div class="row"><span class="name">shift across <b>h</b></span><input type="range" id="h" min="-6" max="6" step="0.5" value="0" oninput="draw()"><span class="val" id="h-v">0</span></div>
      <div class="row"><span class="name">shift up <b>k</b></span><input type="range" id="k" min="-6" max="6" step="0.5" value="0" oninput="draw()"><span class="val" id="k-v">0</span></div>
    </div>
    <div class="pair on" id="p-lin">
      <div class="row"><span class="name">gradient <b>m</b></span><input type="range" id="m" min="-4" max="4" step="0.25" value="1" oninput="draw()"><span class="val" id="m-v">1</span></div>
      <div class="row"><span class="name">intercept <b>c</b></span><input type="range" id="c" min="-6" max="6" step="0.5" value="0" oninput="draw()"><span class="val" id="c-v">0</span></div>
    </div>
  </div></div>

<script>
const $=id=>document.getElementById(id);
const cv=$('gl'),ctx=cv.getContext('2d');let W,H,unit,cx,cy,RANGE=10,type='lin';
function resize(){const d=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=W*d;cv.height=H*d;ctx.setTransform(d,0,0,d,0,0);unit=Math.min(W,H)/(2*RANGE);cx=W/2;cy=H/2;draw();}
const mx=x=>cx+x*unit, my=y=>cy-y*unit;
function setType(t){type=t;$('t-quad').classList.toggle('on',t==='quad');$('t-lin').classList.toggle('on',t==='lin');$('p-quad').classList.toggle('on',t==='quad');$('p-lin').classList.toggle('on',t==='lin');draw();}
window.setType=setType;
function grid(){ctx.fillStyle='#0c1b2c';ctx.fillRect(0,0,W,H);
  ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,.06)';ctx.beginPath();
  for(let i=-RANGE;i<=RANGE;i++){ctx.moveTo(mx(i),0);ctx.lineTo(mx(i),H);ctx.moveTo(0,my(i));ctx.lineTo(W,my(i));}ctx.stroke();
  ctx.strokeStyle='rgba(234,241,247,.45)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,my(0));ctx.lineTo(W,my(0));ctx.moveTo(mx(0),0);ctx.lineTo(mx(0),H);ctx.stroke();
  ctx.fillStyle='rgba(234,241,247,.4)';ctx.font='11px Hanken Grotesk';for(let i=-RANGE+2;i<=RANGE-2;i+=2){if(i!==0){ctx.fillText(i,mx(i)-4,my(0)+14);ctx.fillText(i,mx(0)+5,my(i)+4);}}}
function plot(fn,color,wdt,dash){ctx.strokeStyle=color;ctx.lineWidth=wdt;ctx.setLineDash(dash||[]);ctx.beginPath();let first=true;
  for(let px=0;px<=W;px+=2){const x=(px-cx)/unit;const y=fn(x);if(!isFinite(y)){first=true;continue;}const py=my(y);if(py<-1000||py>H+1000){first=true;continue;}if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);}ctx.stroke();ctx.setLineDash([]);}
function dot(x,y,color,lbl){ctx.fillStyle=color;ctx.beginPath();ctx.arc(mx(x),my(y),5,0,7);ctx.fill();if(lbl){ctx.fillStyle='#eaf1f7';ctx.font='600 12px Hanken Grotesk';ctx.fillText(lbl,mx(x)+8,my(y)-7);}}
function f(n,dp){return (Math.round(n*100)/100).toString();}
function draw(){if(!unit)return;grid();
  if(type==='quad'){let a=+$('a').value,h=+$('h').value,k=+$('k').value;$('a-v').textContent=a;$('h-v').textContent=h;$('k-v').textContent=k;
    plot(x=>x*x,'rgba(234,241,247,.28)',2,[5,5]);
    plot(x=>a*(x-h)*(x-h)+k,'#2ec4b6',3.5);
    dot(h,k,'#f6a623','vertex ('+f(h)+', '+f(k)+')');
    const sign=(v,p,n)=>v>0?p:v<0?n:'';
    $('o-eq').innerHTML='y = '+(a===1?'':a===-1?'−':f(a))+'(x '+(h>0?'− '+f(h):h<0?'+ '+f(-h):'')+')² '+(k>0?'+ '+f(k):k<0?'− '+f(-k):'');
    const disc=-k/a;let roots='none (doesn\'t cross x)';if(a!==0&&disc>=0){const r=Math.sqrt(disc);roots=f(h-r)+' and '+f(h+r);}
    $('o-stats').innerHTML='<div class="rr"><span>Vertex</span><span class="v">('+f(h)+', '+f(k)+')</span></div><div class="rr"><span>y-intercept</span><span class="v">'+f(a*h*h+k)+'</span></div><div class="rr"><span>x-roots</span><span class="v">'+roots+'</span></div>';
    $('o-note').innerHTML='<b>a</b> stretches (negative = flips), <b>h</b> shifts '+(h>=0?'right':'left')+', <b>k</b> shifts '+(k>=0?'up':'down')+'. Vertex sits at <b>(h, k)</b>.';
  } else {let m=+$('m').value,c=+$('c').value;$('m-v').textContent=m;$('c-v').textContent=c;
    plot(x=>x,'rgba(234,241,247,.28)',2,[5,5]);
    plot(x=>m*x+c,'#2ec4b6',3.5);
    dot(0,c,'#f6a623','(0, '+f(c)+')');
    $('o-eq').innerHTML='y = '+(m===1?'':m===-1?'−':f(m))+'x '+(c>0?'+ '+f(c):c<0?'− '+f(-c):'');
    const xint=m!==0?f(-c/m):'none';
    $('o-stats').innerHTML='<div class="rr"><span>Gradient</span><span class="v">'+f(m)+'</span></div><div class="rr"><span>y-intercept</span><span class="v">(0, '+f(c)+')</span></div><div class="rr"><span>x-intercept</span><span class="v">'+xint+'</span></div>';
    $('o-note').innerHTML='<b>m</b> is the gradient (steepness; negative = downhill). <b>c</b> is where it crosses the y-axis.';
  }}
// zoom the graph scale
function zoom(f){RANGE=Math.min(30,Math.max(4,RANGE*f));unit=Math.min(W,H)/(2*RANGE);draw();}
cv.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?1.1:0.9);},{passive:false});
(function(){var z=document.createElement('div');z.style.cssText='position:fixed;left:16px;bottom:140px;z-index:14;display:flex;flex-direction:column;gap:7px';var bp=document.createElement('button'),bm=document.createElement('button');bp.textContent='+';bm.textContent='−';[bp,bm].forEach(function(x){x.style.cssText='width:40px;height:40px;border-radius:11px;border:1px solid rgba(234,241,247,.18);background:rgba(16,28,46,.62);color:#eaf1f7;font-size:22px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px)';});bp.onclick=function(){zoom(0.83);};bm.onclick=function(){zoom(1.2);};z.appendChild(bp);z.appendChild(bm);document.body.appendChild(z);})();
new ResizeObserver(resize).observe(cv);resize();
</script>
</body>
</html>

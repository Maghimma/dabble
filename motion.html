<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Motion Graphs — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--blue:#5b9bff;--panel:rgba(16,28,46,.6)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .typetoggle{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;backdrop-filter:blur(14px)}
  .typetoggle button{font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--dim);background:transparent;border:0;border-radius:8px;padding:7px 14px;cursor:pointer}
  .typetoggle button.on{background:var(--teal);color:#04302c}
  .info{position:fixed;top:104px;right:14px;z-index:9;width:min(228px,52vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .rr{display:flex;justify-content:space-between;font-size:13px;margin-top:7px}.rr:first-child{margin-top:0}.rr .v{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--teal)}
  .note{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:14px clamp(14px,5vw,60px) calc(16px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:680px;margin:0 auto}
  .row{display:flex;align-items:center;gap:14px;margin-top:9px}.row:first-child{margin-top:0}
  .row .name{flex:0 0 120px;font-weight:600;font-size:14px}
  .row input[type=range]{flex:1;accent-color:var(--blue);height:26px}
  .row .val{flex:0 0 70px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--blue)}
  .btns{display:flex;gap:8px;justify-content:center;margin-top:4px}
  .btns button{font-family:inherit;font-weight:600;font-size:13px;color:var(--ink);background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:10px;padding:8px 16px;cursor:pointer}
  .btns button.play{background:var(--teal);color:#04302c;border-color:var(--teal)}
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <a class="back" href="index.html">← Dabble</a>
  <div class="title">🏃 Motion Graphs</div>
  <div class="typetoggle">
    <button id="t-dt" class="on" onclick="setType('dt')">Distance–time</button>
    <button id="t-vt" onclick="setType('vt')">Velocity–time</button>
  </div>
  <div class="info">
    <div class="rr"><span>Time</span><span class="v" id="o-t">0.0 s</span></div>
    <div class="rr"><span>Velocity</span><span class="v" id="o-v">0 m/s</span></div>
    <div class="rr"><span>Distance</span><span class="v" id="o-d">0 m</span></div>
    <div class="note" id="o-note">On a <b>distance–time</b> graph the gradient = speed. On a <b>velocity–time</b> graph the gradient = acceleration and the area = distance.</div>
  </div>
  <div class="ctrl"><div class="wrap2">
    <div class="row"><span class="name">Start velocity</span><input type="range" id="u" min="0" max="20" step="1" value="6" oninput="reset()"><span class="val" id="u-v">6 m/s</span></div>
    <div class="row"><span class="name">Acceleration</span><input type="range" id="a" min="-4" max="4" step="0.5" value="2" oninput="reset()"><span class="val" id="a-v">2 m/s²</span></div>
    <div class="btns"><button class="play" id="playBtn" onclick="toggle()">▶ Play</button><button onclick="reset()">↻ Reset</button></div>
  </div></div>

<script>
const $=id=>document.getElementById(id);const cv=$('gl'),ctx=cv.getContext('2d');
let W,H,type='dt',t=0,playing=false,last=0;
function resize(){const dp=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=W*dp;cv.height=H*dp;ctx.setTransform(dp,0,0,dp,0,0);}
new ResizeObserver(resize).observe(cv);
const TMAX=10;
function u(){return +$('u').value;}function acc(){return +$('a').value;}
function vAt(tt){return Math.max(0,u()+acc()*tt);}
function dAt(tt){let d=0,st=0.02;for(let x=0;x<tt;x+=st)d+=vAt(x)*st;return d;}
function plot(){const w=Math.min(W-300,560),h=Math.min(H-320,360),L=56+Math.max(0,((W-320)-w)/2),T=Math.max(96,Math.round(((H-150)-h)/2)),B=T+h,R=L+w;return{L,R,T,B,w,h};}
function setType(tp){type=tp;$('t-dt').classList.toggle('on',tp==='dt');$('t-vt').classList.toggle('on',tp==='vt');}
window.setType=setType;
function reset(){t=0;playing=false;$('playBtn').textContent='▶ Play';$('u-v').textContent=u()+' m/s';$('a-v').textContent=acc()+' m/s²';}
window.reset=reset;
function toggle(){playing=!playing;$('playBtn').textContent=playing?'❚❚ Pause':'▶ Play';if(t>=TMAX)t=0;}
window.toggle=toggle;
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(playing){t+=dt;if(t>=TMAX){t=TMAX;playing=false;$('playBtn').textContent='▶ Play';}}
  const p=plot();ctx.clearRect(0,0,W,H);
  // running object track (top)
  const trackY=p.T-46;const car=p.L+(dAt(t)/dAt2max())*p.w;
  ctx.strokeStyle='rgba(234,241,247,.25)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.L,trackY);ctx.lineTo(p.R,trackY);ctx.stroke();
  ctx.fillStyle=acc()>0?'#8ce99a':acc()<0?'#ff8f8f':'#5b9bff';ctx.beginPath();ctx.arc(Math.min(car,p.R),trackY,11,0,7);ctx.fill();
  ctx.fillStyle='var(--dim)';ctx.font='11px Hanken Grotesk';ctx.textAlign='center';ctx.fillStyle='rgba(234,241,247,.5)';ctx.fillText('the moving object',(p.L+p.R)/2,trackY-18);
  // axes + grid
  ctx.strokeStyle='rgba(234,241,247,.06)';ctx.lineWidth=1;ctx.beginPath();for(let i=1;i<10;i++){const x=p.L+i/10*p.w;ctx.moveTo(x,p.T);ctx.lineTo(x,p.B);const y=p.B-i/10*p.h;ctx.moveTo(p.L,y);ctx.lineTo(p.R,y);}ctx.stroke();
  ctx.strokeStyle='rgba(234,241,247,.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(p.L,p.T);ctx.lineTo(p.L,p.B);ctx.lineTo(p.R,p.B);ctx.stroke();
  ctx.fillStyle='rgba(234,241,247,.7)';ctx.font='600 12px Hanken Grotesk';ctx.textAlign='center';ctx.fillText('Time (s) →',(p.L+p.R)/2,p.B+26);
  ctx.save();ctx.translate(p.L-40,(p.T+p.B)/2);ctx.rotate(-Math.PI/2);ctx.fillText(type==='dt'?'Distance (m) →':'Velocity (m/s) →',0,0);ctx.restore();
  const yMax=type==='dt'?Math.max(10,dAt2max()):Math.max(10,Math.max(u(),vAt(TMAX))*1.1);
  const X=tt=>p.L+tt/TMAX*p.w, Y=val=>p.B-val/yMax*p.h;
  // area under v-t up to t
  if(type==='vt'){ctx.fillStyle='rgba(91,155,255,.18)';ctx.beginPath();ctx.moveTo(X(0),p.B);for(let x=0;x<=t;x+=0.1)ctx.lineTo(X(x),Y(vAt(x)));ctx.lineTo(X(t),p.B);ctx.closePath();ctx.fill();}
  // full faint curve
  ctx.strokeStyle='rgba(91,155,255,.3)';ctx.lineWidth=2;ctx.beginPath();for(let x=0;x<=TMAX;x+=0.1){const val=type==='dt'?dAt(x):vAt(x);x===0?ctx.moveTo(X(x),Y(val)):ctx.lineTo(X(x),Y(val));}ctx.stroke();
  // drawn-so-far curve
  ctx.strokeStyle='#5b9bff';ctx.lineWidth=3.5;ctx.beginPath();for(let x=0;x<=t;x+=0.1){const val=type==='dt'?dAt(x):vAt(x);x===0?ctx.moveTo(X(x),Y(val)):ctx.lineTo(X(x),Y(val));}ctx.stroke();
  // moving dot on curve
  const cur=type==='dt'?dAt(t):vAt(t);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(X(t),Y(cur),6,0,7);ctx.fill();
  $('o-t').textContent=t.toFixed(1)+' s';$('o-v').textContent=Math.round(vAt(t))+' m/s';$('o-d').textContent=Math.round(dAt(t))+' m';
  $('o-note').innerHTML=type==='dt'?'<b>Distance–time:</b> steeper line = faster. A curve means changing speed (accelerating). Gradient = speed.':'<b>Velocity–time:</b> gradient = <b>acceleration</b>; shaded <b>area</b> under the line = distance travelled.';
  requestAnimationFrame(loop);}
function dAt2max(){return dAt(TMAX)||1;}
resize();reset();requestAnimationFrame(loop);
</script>
</body>
</html>

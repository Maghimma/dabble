<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Diffusion, Osmosis &amp; Active Transport — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--blue:#74c0fc;--green:#8ce99a;--panel:rgba(16,28,46,.6)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:20px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .typetoggle{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;backdrop-filter:blur(14px)}
  .typetoggle button{font-family:'Hanken Grotesk';font-weight:600;font-size:12.5px;color:var(--dim);background:transparent;border:0;border-radius:8px;padding:7px 12px;cursor:pointer}
  .typetoggle button.on{background:var(--teal);color:#04302c}
  .info{position:fixed;top:100px;right:14px;z-index:9;width:min(232px,52vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .state{font-family:'Fraunces',serif;font-size:20px;text-align:center;margin-bottom:4px}
  .note{font-size:11.5px;color:var(--dim);line-height:1.55;margin-top:9px;border-top:1px dashed var(--line);padding-top:9px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:14px clamp(14px,5vw,60px) calc(16px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:700px;margin:0 auto}
  .row{display:flex;align-items:center;gap:14px;margin-top:9px}.row:first-child{margin-top:0}
  .row .name{flex:0 0 140px;font-weight:600;font-size:14px}
  .row input[type=range]{flex:1;accent-color:var(--teal);height:28px}
  .row .val{flex:0 0 92px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--teal)}
  .seg button{font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--dim);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:9px;padding:8px 14px;cursor:pointer}
  .seg button.on{background:var(--teal);color:#04302c;border-color:var(--teal)}
  .ghost{font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--ink);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:10px;padding:8px 16px;cursor:pointer}
  .blk{display:none}.blk.on{display:block}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
  body.preview .back,body.preview .title,body.preview .typetoggle,body.preview .info,body.preview .ctrl{display:none!important}
</style>
</head>
<body>
  <div id="loader">setting up the cell…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="https://maghimma.github.io/dabble/">← Dabble</a>
  <div class="title" id="o-title">🫧 Diffusion</div>
  <div class="typetoggle">
    <button id="t-diff" class="on" onclick="setMode('diff')">Diffusion</button>
    <button id="t-osm" onclick="setMode('osm')">Osmosis</button>
    <button id="t-at" onclick="setMode('at')">Active transport</button>
  </div>
  <div class="info">
    <div class="state" id="o-state" style="display:none"></div>
    <div id="o-vars" style="font-size:13px;text-align:center;color:var(--teal);font-family:Fraunces;font-weight:600;margin-bottom:2px"></div>
    <div class="note" id="o-note"></div>
  </div>
  <div class="ctrl"><div class="wrap2">
    <div class="blk on" id="ctlTank">
      <div class="row" style="justify-content:flex-end"><button class="ghost" onclick="reset()">↻ Reset</button></div>
      <div class="row"><span class="name">Starting imbalance</span><input type="range" id="imb" min="0" max="100" step="10" value="80" oninput="reset()"><span class="val" id="imb-v">80%</span></div>
      <div class="row"><span class="name">Temperature</span><input type="range" id="temp" min="1" max="10" step="1" value="5" oninput="upd()"><span class="val" id="temp-v">5</span></div>
    </div>
    <div class="blk" id="ctlCell">
      <div class="row"><span class="name">Cell type</span><div class="seg"><button id="c-plant" class="on" onclick="setCell('plant')">🌱 Plant</button><button id="c-animal" onclick="setCell('animal')">🐾 Animal</button></div></div>
      <div class="row"><span class="name">Solution outside</span><input type="range" id="sol" min="0" max="100" step="2" value="80" oninput="upd()"><span class="val" id="sol-v">dilute</span></div>
    </div>
  </div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
const __err=m=>{const l=document.getElementById('loader');if(l){l.style.opacity=1;l.textContent=String(m).slice(0,150);l.style.color='#ff9a8a';}};
window.addEventListener('error',e=>__err('ERR: '+(e.message||e.error)));
import * as THREE from 'three';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));const rnd=()=>Math.random()-0.5;const lerp=(a,b,t)=>a+(b-a)*t;
const PREVIEW=new URLSearchParams(location.search).has('preview');if(PREVIEW)document.body.classList.add('preview');
const canvas=$('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x16283e,110,210);
const camera=new THREE.PerspectiveCamera(50,1,0.1,400);
(()=>{const c=document.createElement('canvas');c.width=8;c.height=256;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#1d3a5c');gr.addColorStop(.6,'#13263c');gr.addColorStop(1,'#0c1b2c');g.fillStyle=gr;g.fillRect(0,0,8,256);scene.background=new THREE.CanvasTexture(c);})();
scene.add(new THREE.HemisphereLight(0xcfe6ff,0x223044,1));
const key=new THREE.DirectionalLight(0xffffff,1.3);key.position.set(22,36,18);key.castShadow=true;key.shadow.mapSize.set(1024,1024);key.shadow.camera.near=1;key.shadow.camera.far=160;key.shadow.camera.left=-48;key.shadow.camera.right=48;key.shadow.camera.top=48;key.shadow.camera.bottom=-48;key.shadow.bias=-0.0004;scene.add(key);
scene.add(new THREE.AmbientLight(0xffffff,.28));
const bench=new THREE.Mesh(new THREE.BoxGeometry(110,4,64),new THREE.MeshStandardMaterial({color:0x2b3a4d,roughness:.9}));bench.position.y=-16;bench.receiveShadow=true;scene.add(bench);
function lab(text,x,y,z,col,sc){const t=document.createElement('canvas').getContext('2d');t.font='600 30px Hanken Grotesk,sans-serif';const w=Math.ceil(t.measureText(text).width)+24;const c=document.createElement('canvas');c.width=w;c.height=46;const g=c.getContext('2d');g.font='600 30px Hanken Grotesk,sans-serif';g.fillStyle=col||'#cfe0ee';g.textAlign='center';g.textBaseline='middle';g.fillText(text,w/2,25);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,depthTest:false}));const k=(sc||3);s.scale.set(k*w/46,k,1);s.position.set(x,y,z);scene.add(s);return s;}
// ===== TANK (diffusion + active transport) =====
const gTank=new THREE.Group();scene.add(gTank);
const BX=24,BY=12,BZ=11;
const glass=new THREE.Mesh(new THREE.BoxGeometry(BX*2,BY*2,BZ*2),new THREE.MeshStandardMaterial({color:0xbfe2f0,transparent:true,opacity:.12,roughness:.05,side:THREE.DoubleSide}));gTank.add(glass);
const ge=new THREE.LineSegments(new THREE.EdgesGeometry(glass.geometry),new THREE.LineBasicMaterial({color:0x8fd6e6,transparent:true,opacity:.4}));gTank.add(ge);
const memb=new THREE.Mesh(new THREE.BoxGeometry(0.6,BY*2,BZ*2),new THREE.MeshStandardMaterial({color:0xb8c6d4,transparent:true,opacity:.18}));gTank.add(memb);
const mlab=lab('partially permeable membrane',0,BY+3,0,'#cfe0ee',2.6);gTank.add(mlab);
// carrier proteins (for active transport)
const carriers=[];[-5,0,5].forEach(z=>{const c=new THREE.Mesh(new THREE.CylinderGeometry(1.4,1.4,4.5,12),new THREE.MeshStandardMaterial({color:0x6ad0a0,emissive:0x143a2a,emissiveIntensity:.4,roughness:.5}));c.position.set(0,2,z);gTank.add(c);carriers.push(c);});
const carlab=lab('carrier proteins + energy (ATP)',0,-BY-3,0,'#8ce99a',2.6);gTank.add(carlab);
const sGeo=new THREE.SphereGeometry(1.25,12,10),wGeo=new THREE.SphereGeometry(0.8,10,8);
const sMat=new THREE.MeshStandardMaterial({color:0xf6a623,roughness:.4,emissive:0xf6a623,emissiveIntensity:.25});
const wMat=new THREE.MeshStandardMaterial({color:0x74c0fc,roughness:.4,emissive:0x18324a,emissiveIntensity:.3});
let parts=[];
function randPos(side){const x=side<0?-BX+2+Math.random()*(BX-3):2+Math.random()*(BX-3);return new THREE.Vector3(x,rnd()*2*(BY-2),rnd()*2*(BZ-2));}
function reset(){parts.forEach(p=>gTank.remove(p.m));parts=[];
  const imb=+$('imb').value;$('imb-v').textContent=imb+'%';
  const NS=34,leftFrac=mode==='at'?0.62:0.5+imb/200,leftN=Math.round(NS*(mode==='at'?0.7:leftFrac));
  for(let i=0;i<NS;i++){const side=i<leftN?-1:1;const m=new THREE.Mesh(sGeo,sMat);m.castShadow=true;m.position.copy(randPos(side));gTank.add(m);parts.push({m,t:'s',v:new THREE.Vector3(rnd(),rnd(),rnd()).multiplyScalar(10)});}
  for(let i=0;i<26;i++){const m=new THREE.Mesh(wGeo,wMat);m.castShadow=true;m.position.copy(randPos(i%2?1:-1));gTank.add(m);parts.push({m,t:'w',v:new THREE.Vector3(rnd(),rnd(),rnd()).multiplyScalar(10)});}
}
window.reset=reset;
// ===== CELL (osmosis) =====
const gCell=new THREE.Group();scene.add(gCell);gCell.visible=false;
let cellType='plant',wall,pmemb,vac,animal,waterDots=[],cellLabs=[];
function clearLabs(){cellLabs.forEach(l=>gCell.remove(l));cellLabs=[];}
function buildCell(){[wall,pmemb,vac,animal].forEach(o=>{if(o)gCell.remove(o);});clearLabs();waterDots.forEach(d=>gCell.remove(d.m));waterDots=[];wall=pmemb=vac=animal=null;
  if(cellType==='plant'){
    wall=new THREE.Mesh(new THREE.BoxGeometry(22,17,13),new THREE.MeshStandardMaterial({color:0x7bbf6a,transparent:true,opacity:.16,side:THREE.DoubleSide}));gCell.add(wall);
    gCell.add(new THREE.LineSegments(new THREE.EdgesGeometry(wall.geometry),new THREE.LineBasicMaterial({color:0x9ad98a})));
    pmemb=new THREE.Mesh(new THREE.BoxGeometry(20,15,11),new THREE.MeshStandardMaterial({color:0x2ec4b6,transparent:true,opacity:.32,roughness:.3}));gCell.add(pmemb);
    vac=new THREE.Mesh(new THREE.SphereGeometry(6,28,20),new THREE.MeshStandardMaterial({color:0x74c0fc,transparent:true,opacity:.4,roughness:.2}));gCell.add(vac);
    cellLabs.push(lab('cell wall (rigid)',0,12,7,'#9ad98a',2.4));cellLabs.push(lab('membrane',0,-12,7,'#7fe6dd',2.4));cellLabs.push(lab('vacuole',0,0,7,'#9fd0ff',2.2));
  }else{
    animal=new THREE.Mesh(new THREE.SphereGeometry(9,40,28),new THREE.MeshStandardMaterial({color:0xff9aa0,transparent:true,opacity:.5,roughness:.3,emissive:0x3a1418,emissiveIntensity:.3}));gCell.add(animal);
    gCell.add(new THREE.Mesh(new THREE.SphereGeometry(2.6,20,16),new THREE.MeshStandardMaterial({color:0x8a5a9c,roughness:.4})));
    cellLabs.push(lab('cell membrane',0,11,0,'#ffb3b3',2.4));cellLabs.push(lab('(no cell wall)',0,-12,0,'#cf9a9a',2.2));
  }
  for(let i=0;i<12;i++){const m=new THREE.Mesh(wGeo,wMat);gCell.add(m);waterDots.push({m,a:i/12*Math.PI*2,r:14+Math.random()*4});}
}
function setCell(t){cellType=t;$('c-plant').classList.toggle('on',t==='plant');$('c-animal').classList.toggle('on',t==='animal');buildCell();upd();}
window.setCell=setCell;
// ===== mode / UI =====
let mode='diff';
function setMode(mm){mode=mm;['diff','osm','at'].forEach(k=>$('t-'+k).classList.toggle('on',k===mm));
  gTank.visible=mm!=='osm';gCell.visible=mm==='osm';
  carriers.forEach(c=>c.visible=mm==='at');carlab.visible=mm==='at';mlab.visible=mm!=='osm';
  $('ctlTank').classList.toggle('on',mm!=='osm');$('ctlCell').classList.toggle('on',mm==='osm');
  $('o-state').style.display=mm==='osm'?'block':'none';
  $('o-title').textContent=mm==='diff'?'🫧 Diffusion':mm==='osm'?'💧 Osmosis in cells':'⚡ Active transport';
  if(mm==='osm'){buildCell();orbit.R=46;}else{reset();orbit.R=74;}
  upd();applyCam();
}
window.setMode=setMode;
function upd(){
  $('temp-v').textContent=$('temp').value;
  const s=+$('sol').value;$('sol-v').textContent=s>=66?'dilute 💧':s>=40?'isotonic':'concentrated 🧂';
  if(mode==='diff')$('o-note').innerHTML='<b>Diffusion:</b> particles spread from <b>high → low</b> concentration until evenly mixed. Passive — <b>no energy</b> needed. Warmer = faster.';
  else if(mode==='at')$('o-note').innerHTML='<b>Active transport:</b> carrier proteins pump particles from <b>LOW → HIGH</b> concentration (against the gradient) using <b>energy (ATP)</b>.';
  else{ // osmosis cell state
    let st,note;
    if(cellType==='plant'){st=s>=64?'Turgid':s>=40?'Flaccid':'Plasmolysed';
      note=s>=64?'Water enters (dilute outside). The vacuole swells and pushes the membrane against the rigid wall → <b>turgid</b> and firm.':s>=40?'Balanced — little net water movement. The cell is <b>flaccid</b> (soft, not firm).':'Water leaves (concentrated outside). The membrane <b>pulls away from the wall</b> → <b>plasmolysed</b>.';}
    else{st=s>=78?'Burst (lysed) 💥':s>=58?'Swollen':s>=40?'Normal':'Shrivelled';
      note=s>=78?'Too much water enters — with no cell wall the membrane <b>bursts (lysis)</b>.':s>=58?'Water enters, the cell <b>swells</b> (close to bursting).':s>=40?'Balanced — no net water movement, cell stays <b>normal</b>.':'Water leaves — the cell <b>shrivels (crenation)</b>.';}
    $('o-state').textContent=st;$('o-note').innerHTML=note;
  }
}
window.upd=upd;
const R=1.2;
function stepTank(dt){const tgt=6+(+$('temp').value)*3;
  let sl=0,sr=0;for(const p of parts)if(p.t==='s'){if(p.m.position.x<0)sl++;else sr++;}
  for(const p of parts){const v=p.v,m=p.m.position;m.addScaledVector(v,dt);
    if(m.x<-BX+R){m.x=-BX+R;v.x=Math.abs(v.x);}if(m.x>BX-R){m.x=BX-R;v.x=-Math.abs(v.x);}
    if(m.y<-BY+R){m.y=-BY+R;v.y=Math.abs(v.y);}if(m.y>BY-R){m.y=BY-R;v.y=-Math.abs(v.y);}
    if(m.z<-BZ+R){m.z=-BZ+R;v.z=Math.abs(v.z);}if(m.z>BZ-R){m.z=BZ-R;v.z=-Math.abs(v.z);}
    if(mode==='at'&&p.t==='s'){ // pump left -> right only
      if(m.x>-1.2&&m.x<1.2){m.x=1.2;v.x=Math.abs(v.x);} // crossed to right, keep going right
      if(m.x>=1.2&&v.x<0&&Math.abs(m.x)<2){/* stays right */}
    }
    const sp=v.length();if(sp>0.01)v.multiplyScalar(clamp(tgt/sp,0.8,1.25));
  }
  if(mode==='at')carriers.forEach(c=>c.material.emissiveIntensity=.4+0.4*Math.abs(Math.sin(performance.now()/200+c.position.z)));
  const dir=sl>sr?'⟶ net movement right':sr>sl?'⟵ net movement left':'⇌ balanced (equilibrium)';
  $('o-vars').innerHTML='solute → left side <b>'+sl+'</b> · right side <b>'+sr+'</b><br><span style="color:#cfe0ee;font-family:Hanken Grotesk;font-weight:600;font-size:11.5px">'+(mode==='at'?'pumped LOW → HIGH (against gradient)':dir)+'</span>';
}
function stepCell(dt){const s=+$('sol').value;
  if(cellType==='plant'){const T=clamp((s-10)/90,0,1);const sc=lerp(0.6,0.99,T);
    if(pmemb)pmemb.scale.set(sc,sc,sc);if(vac)vac.scale.setScalar(lerp(0.55,1.0,T));}
  else if(animal){const sc=lerp(0.6,1.45,s/100);animal.scale.setScalar(sc);
    animal.material.color.set(s>=78?0xff5b5b:0xff9aa0);}
  // water direction dots: in if dilute(s>50), out if concentrated
  const dir=(s-50)/50; // +in -out
  for(const d of waterDots){d.a+=dt*0.6;d.r-=dir*8*dt;if(d.r<6){d.r=16;}if(d.r>18){d.r=8;}
    d.m.position.set(Math.cos(d.a)*d.r,Math.sin(d.a*1.3)*d.r*0.6,Math.sin(d.a)*d.r);}
}
const orbit={th:0.1,ph:1.05,R:74,tgt:new THREE.Vector3(0,0,0),drag:false,px:0,py:0};
function applyCam(){const{th,ph,R,tgt}=orbit;camera.position.set(tgt.x+R*Math.sin(ph)*Math.sin(th),tgt.y+R*Math.cos(ph),tgt.z+R*Math.sin(ph)*Math.cos(th));camera.lookAt(tgt);}
function zoom(f){orbit.R=clamp(orbit.R*f,12,200);applyCam();}
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?1.08:0.926);},{passive:false});
(function(){var z=document.createElement('div');z.style.cssText='position:fixed;left:16px;bottom:150px;z-index:14;display:flex;flex-direction:column;gap:7px';var bp=document.createElement('button'),bm=document.createElement('button');bp.textContent='+';bm.textContent='−';[bp,bm].forEach(function(x){x.style.cssText='width:40px;height:40px;border-radius:11px;border:1px solid rgba(234,241,247,.18);background:rgba(16,28,46,.62);color:#eaf1f7;font-size:22px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px)';});bp.onclick=function(){zoom(0.8);};bm.onclick=function(){zoom(1.25);};z.appendChild(bp);z.appendChild(bm);document.body.appendChild(z);if(document.body.classList.contains('preview'))z.style.display='none';})();
canvas.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.px)*.006;orbit.ph=clamp(orbit.ph-(e.clientY-orbit.py)*.005,.5,1.4);orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointerup',()=>orbit.drag=false);
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);
const clock=new THREE.Clock();
function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.04);if(!orbit.drag)orbit.th+=dt*.05;applyCam();
  if(mode==='osm')stepCell(dt);else stepTank(dt);renderer.render(scene,camera);}
reset();setMode('diff');resize();applyCam();tick();
setTimeout(()=>$('loader').classList.add('hide'),700);
</script>
</body>
</html>

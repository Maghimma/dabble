<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Diffusion, Osmosis &amp; Active Transport — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--panel:rgba(16,28,46,.6)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:20px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .typetoggle{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;backdrop-filter:blur(14px)}
  .typetoggle button{font-family:'Hanken Grotesk';font-weight:600;font-size:12.5px;color:var(--dim);background:transparent;border:0;border-radius:8px;padding:7px 12px;cursor:pointer}
  .typetoggle button.on{background:var(--teal);color:#04302c}
  .info{position:fixed;top:100px;right:14px;z-index:9;width:min(234px,52vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .note{font-size:11.7px;color:var(--dim);line-height:1.55;}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:14px clamp(14px,5vw,60px) calc(16px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:700px;margin:0 auto}
  .row{display:flex;align-items:center;gap:14px;margin-top:9px}.row:first-child{margin-top:0}
  .row .name{flex:0 0 150px;font-weight:600;font-size:14px}
  .row input[type=range]{flex:1;accent-color:var(--teal);height:28px}
  .row .val{flex:0 0 70px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--teal)}
  .ghost{font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--ink);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:10px;padding:8px 16px;cursor:pointer}
  .blk{display:none}.blk.on{display:block}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
  body.preview .back,body.preview .title,body.preview .typetoggle,body.preview .info,body.preview .ctrl{display:none!important}
</style>
</head>
<body>
  <div id="loader">setting up the experiment…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="index.html">← Dabble</a>
  <div class="title" id="o-title">🫧 Diffusion</div>
  <div class="typetoggle">
    <button id="t-diff" class="on" onclick="setMode('diff')">Diffusion</button>
    <button id="t-osm" onclick="setMode('osm')">Osmosis</button>
    <button id="t-at" onclick="setMode('at')">Active transport</button>
  </div>
  <div class="info"><div class="note" id="o-note"></div></div>
  <div class="ctrl"><div class="wrap2">
    <div class="blk on" id="ctlDiff">
      <div class="row" style="justify-content:flex-end"><button class="ghost" onclick="resetDiff()">↻ New crystal</button></div>
      <div class="row"><span class="name">Temperature</span><input type="range" id="temp" min="1" max="10" step="1" value="5" oninput="upd()"><span class="val" id="temp-v">5</span></div>
    </div>
    <div class="blk" id="ctlOsm">
      <div class="row" style="justify-content:flex-end"><button class="ghost" onclick="resetOsm()">↻ Reset</button></div>
      <div class="row"><span class="name">Sugar concentration</span><input type="range" id="conc" min="1" max="10" step="1" value="6" oninput="upd()"><span class="val" id="conc-v">6</span></div>
    </div>
    <div class="blk" id="ctlAT">
      <div class="row"><span class="name">Energy supply (ATP)</span><input type="range" id="atp" min="1" max="10" step="1" value="6" oninput="upd()"><span class="val" id="atp-v">6</span></div>
    </div>
  </div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
const __err=m=>{const l=document.getElementById('loader');if(l){l.style.opacity=1;l.textContent=String(m).slice(0,150);l.style.color='#ff9a8a';}};
window.addEventListener('error',e=>__err('ERR: '+(e.message||e.error)));
import * as THREE from 'three';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));const rnd=()=>Math.random()-0.5;const lerp=(a,b,t)=>a+(b-a)*t;
const PREVIEW=new URLSearchParams(location.search).has('preview');if(PREVIEW)document.body.classList.add('preview');
const canvas=$('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x16283e,100,210);
const camera=new THREE.PerspectiveCamera(50,1,0.1,400);
(()=>{const c=document.createElement('canvas');c.width=8;c.height=256;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#24405c');gr.addColorStop(.6,'#15293f');gr.addColorStop(1,'#0c1b2c');g.fillStyle=gr;g.fillRect(0,0,8,256);scene.background=new THREE.CanvasTexture(c);})();
scene.add(new THREE.HemisphereLight(0xcfe6ff,0x202a38,.9));
const key=new THREE.DirectionalLight(0xffffff,1.3);key.position.set(20,34,18);key.castShadow=true;key.shadow.mapSize.set(1024,1024);key.shadow.camera.near=1;key.shadow.camera.far=140;key.shadow.camera.left=-40;key.shadow.camera.right=40;key.shadow.camera.top=40;key.shadow.camera.bottom=-40;key.shadow.bias=-0.0004;scene.add(key);
scene.add(new THREE.AmbientLight(0xffffff,.28));
function lab(text,x,y,z,col,p){const t=document.createElement('canvas').getContext('2d');t.font='600 30px Hanken Grotesk,sans-serif';const w=Math.ceil(t.measureText(text).width)+24;const c=document.createElement('canvas');c.width=w;c.height=46;const g=c.getContext('2d');g.font='600 30px Hanken Grotesk,sans-serif';g.fillStyle=col;g.textAlign='center';g.textBaseline='middle';g.fillText(text,w/2,25);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,depthTest:false}));s.scale.set(2.4*w/46,2.4,1);s.position.set(x,y,z);(p||scene).add(s);return s;}
const FLOOR=-12;
const bench=new THREE.Mesh(new THREE.BoxGeometry(80,4,48),new THREE.MeshStandardMaterial({color:0x2b3a4d,roughness:.9}));bench.position.y=FLOOR-2;bench.receiveShadow=true;scene.add(bench);
// shared beaker (diffusion + osmosis)
const BR=12,BH=22,SURF=FLOOR+16;
const gBeaker=new THREE.Group();scene.add(gBeaker);
gBeaker.add(new THREE.Mesh(new THREE.CylinderGeometry(BR,BR,BH,52,1,true),new THREE.MeshStandardMaterial({color:0xbfe2f0,transparent:true,opacity:.13,roughness:.06,side:THREE.DoubleSide})).translateY(FLOOR+BH/2));
gBeaker.add(new THREE.Mesh(new THREE.CylinderGeometry(BR,BR*.96,1.2,52),new THREE.MeshStandardMaterial({color:0xbfe2f0,transparent:true,opacity:.28})).translateY(FLOOR+.6));
const beakWater=new THREE.Mesh(new THREE.CylinderGeometry(BR-.5,BR-.5,SURF-FLOOR-1,44),new THREE.MeshStandardMaterial({color:0x5fa8e0,transparent:true,opacity:.18,roughness:.2}));beakWater.position.y=(FLOOR+SURF)/2;gBeaker.add(beakWater);
const rimB=new THREE.Mesh(new THREE.TorusGeometry(BR,0.4,10,52),new THREE.MeshStandardMaterial({color:0xdaf0fb,transparent:true,opacity:.5}));rimB.rotation.x=Math.PI/2;rimB.position.y=FLOOR+BH;gBeaker.add(rimB);
// ===== DIFFUSION: potassium permanganate crystal =====
const gDiff=new THREE.Group();scene.add(gDiff);
const crystal=new THREE.Group();for(let i=0;i<7;i++){const c=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,1.2),new THREE.MeshStandardMaterial({color:0x4a1060,roughness:.5,emissive:0x2a0838,emissiveIntensity:.5}));c.position.set(rnd()*2.4,FLOOR+1.4+Math.random()*1.5,rnd()*2.4);c.rotation.set(rnd()*3,rnd()*3,rnd()*3);c.castShadow=true;crystal.add(c);}gDiff.add(crystal);
lab('potassium permanganate',0,FLOOR-3.5,0,'#c98ad0',gDiff);
const NDIFF=64,dparts=[];const dGeo=new THREE.SphereGeometry(.7,10,8);const dMat=new THREE.MeshStandardMaterial({color:0x9b3bd0,emissive:0x3a1050,emissiveIntensity:.5,roughness:.4});
for(let i=0;i<NDIFF;i++){const m=new THREE.Mesh(dGeo,dMat);gDiff.add(m);dparts.push({m,v:new THREE.Vector3()});}
function resetDiff(){for(const p of dparts){p.m.position.set(rnd()*3,FLOOR+2+Math.random()*2,rnd()*3);p.v.set(rnd(),Math.random(),rnd()).multiplyScalar(6);}}
window.resetDiff=resetDiff;
// ===== OSMOSIS: visking tubing + rising tube =====
const gOsm=new THREE.Group();scene.add(gOsm);
const visk=new THREE.Mesh(new THREE.CapsuleGeometry(3,7,8,16),new THREE.MeshStandardMaterial({color:0xe7c84a,transparent:true,opacity:.55,roughness:.3}));visk.position.set(0,FLOOR+6,0);gOsm.add(visk);
lab('visking tubing (sugar solution)',0,FLOOR-3.5,0,'#ecd97a',gOsm);
const stube=new THREE.Mesh(new THREE.CylinderGeometry(1,1,18,24,1,true),new THREE.MeshStandardMaterial({color:0xdaf0fb,transparent:true,opacity:.2,roughness:.05,side:THREE.DoubleSide}));stube.position.set(0,FLOOR+19,0);gOsm.add(stube);
const col=new THREE.Mesh(new THREE.CylinderGeometry(.8,.8,1,16),new THREE.MeshStandardMaterial({color:0xe7c84a,roughness:.3,emissive:0x3a3010,emissiveIntensity:.3}));gOsm.add(col);
lab('water level rises →',7,FLOOR+22,0,'#ecd97a',gOsm);
let level=2;const oW=[];for(let i=0;i<14;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(.7,8,8),new THREE.MeshStandardMaterial({color:0x5fb2ff,emissive:0x16344f,emissiveIntensity:.4}));gOsm.add(m);oW.push({m,a:i/14*6.28,r:5+Math.random()*4});}
function resetOsm(){level=2;}
window.resetOsm=resetOsm;
// ===== ACTIVE TRANSPORT: membrane + carrier proteins =====
const gAT=new THREE.Group();scene.add(gAT);
const MEMY=0;
for(let s=-1;s<=1;s+=2){for(let x=-16;x<=16;x+=2.1){const head=new THREE.Mesh(new THREE.SphereGeometry(.9,12,10),new THREE.MeshStandardMaterial({color:0xf6c85a,roughness:.4}));head.position.set(x,MEMY+s*2.4,0);gAT.add(head);const tail=new THREE.Mesh(new THREE.CylinderGeometry(.18,.18,2.6,6),new THREE.MeshStandardMaterial({color:0xcaa84a}));tail.position.set(x,MEMY+s*1.0,0);gAT.add(tail);}}
const carriers=[];[-7,0,7].forEach(x=>{const c=new THREE.Mesh(new THREE.CylinderGeometry(2,2,6.5,16),new THREE.MeshStandardMaterial({color:0x6ad0a0,emissive:0x143a2a,emissiveIntensity:.4,roughness:.5}));c.position.set(x,MEMY,0);gAT.add(c);carriers.push({mesh:c,x});});
lab('cell membrane',-19,MEMY,0,'#f6c85a',gAT);lab('LOW concentration (outside)',0,MEMY-9,0,'#9fb6cf',gAT);lab('HIGH concentration (inside)',0,MEMY+9,0,'#9fe6dd',gAT);lab('carrier protein + ATP',0,MEMY+6.5,0,'#8ce99a',gAT);
const NAT=22,atI=[];const aGeo=new THREE.SphereGeometry(.85,10,8);const aMat=new THREE.MeshStandardMaterial({color:0x2ec4b6,emissive:0x0e3a34,emissiveIntensity:.5,roughness:.4});
for(let i=0;i<NAT;i++){const m=new THREE.Mesh(aGeo,aMat);gAT.add(m);atI.push({m,x:rnd()*32,z:rnd()*8,y:MEMY-4-Math.random()*5,state:'low'});}
const sparks=[];for(let i=0;i<8;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(.5,8,8),new THREE.MeshBasicMaterial({color:0xffe066,transparent:true}));m.visible=false;gAT.add(m);sparks.push({m,life:0});}
// ===== mode =====
let mode='diff';
function setMode(mm){mode=mm;['diff','osm','at'].forEach(k=>$('t-'+k).classList.toggle('on',k===mm));
  gBeaker.visible=mm!=='at';gDiff.visible=mm==='diff';gOsm.visible=mm==='osm';gAT.visible=mm==='at';
  $('ctlDiff').classList.toggle('on',mm==='diff');$('ctlOsm').classList.toggle('on',mm==='osm');$('ctlAT').classList.toggle('on',mm==='at');
  $('o-title').textContent=mm==='diff'?'🫧 Diffusion':mm==='osm'?'💧 Osmosis':'⚡ Active transport';
  if(mm==='diff'){orbit.R=52;orbit.tgt.set(0,2,0);resetDiff();}else if(mm==='osm'){orbit.R=58;orbit.tgt.set(0,6,0);resetOsm();}else{orbit.R=52;orbit.tgt.set(0,0,0);}
  upd();applyCam();
}
window.setMode=setMode;
function upd(){$('temp-v').textContent=$('temp').value;$('conc-v').textContent=$('conc').value;$('atp-v').textContent=$('atp').value;
  $('o-note').innerHTML=mode==='diff'?'<b>Diffusion:</b> the purple potassium permanganate spreads from the crystal (high concentration) out through the water until evenly mixed. Passive — no energy. Warmer = faster.':mode==='osm'?'<b>Osmosis:</b> water passes through the partially-permeable <b>visking tubing</b> into the sugar solution, so the liquid <b>rises up the tube</b>. Stronger sugar → faster rise.':'<b>Active transport:</b> carrier proteins pump particles from <b>LOW → HIGH</b> concentration (against the gradient) using <b>energy (ATP)</b>.';}
window.upd=upd;
const orbit={th:0.3,ph:1.0,R:52,tgt:new THREE.Vector3(0,2,0),drag:false,px:0,py:0};
function applyCam(){const{th,ph,R,tgt}=orbit;camera.position.set(tgt.x+R*Math.sin(ph)*Math.sin(th),tgt.y+R*Math.cos(ph),tgt.z+R*Math.sin(ph)*Math.cos(th));camera.lookAt(tgt);}
function zoom(f){orbit.R=clamp(orbit.R*f,18,140);applyCam();}
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?1.08:0.926);},{passive:false});
(function(){var z=document.createElement('div');z.style.cssText='position:fixed;left:16px;bottom:150px;z-index:14;display:flex;flex-direction:column;gap:7px';var bp=document.createElement('button'),bm=document.createElement('button');bp.textContent='+';bm.textContent='−';[bp,bm].forEach(function(x){x.style.cssText='width:40px;height:40px;border-radius:11px;border:1px solid rgba(234,241,247,.18);background:rgba(16,28,46,.62);color:#eaf1f7;font-size:22px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px)';});bp.onclick=function(){zoom(0.8);};bm.onclick=function(){zoom(1.25);};z.appendChild(bp);z.appendChild(bm);document.body.appendChild(z);if(document.body.classList.contains('preview'))z.style.display='none';})();
canvas.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.px)*.006;orbit.ph=clamp(orbit.ph-(e.clientY-orbit.py)*.005,.45,1.4);orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointerup',()=>orbit.drag=false);
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);
const clock=new THREE.Clock();
function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.04);if(!orbit.drag)orbit.th+=dt*.05;applyCam();
  if(mode==='diff'){const sp=4+(+$('temp').value)*3;
    for(const p of dparts){const m=p.m.position,v=p.v;v.x+=rnd()*sp*dt*2;v.y+=rnd()*sp*dt*2;v.z+=rnd()*sp*dt*2;m.addScaledVector(v,dt);
      const r=Math.hypot(m.x,m.z),lim=BR-1;if(r>lim){const nx=m.x/r,nz=m.z/r;m.x=nx*lim;m.z=nz*lim;const d=v.x*nx+v.z*nz;v.x-=2*d*nx;v.z-=2*d*nz;}
      if(m.y<FLOOR+1){m.y=FLOOR+1;v.y=Math.abs(v.y);}if(m.y>SURF-1){m.y=SURF-1;v.y=-Math.abs(v.y);}
      const s=v.length();if(s>0.01)v.multiplyScalar(clamp(sp/s,0.7,1.3));}
  } else if(mode==='osm'){const c=+$('conc').value;level=Math.min(15,level+dt*c*0.18);
    col.scale.y=level;col.position.y=FLOOR+12+level/2;
    for(const d of oW){d.a+=dt*0.8;d.r-=dt*3;if(d.r<2.5)d.r=8;d.m.position.set(Math.cos(d.a)*d.r,FLOOR+5+Math.sin(d.a*1.4)*3,Math.sin(d.a)*d.r);}
  } else { const rate=+$('atp').value;
    for(const io of atI){const m=io.m.position;
      if(io.state==='low'){m.y=io.y;m.x=io.x+Math.sin(performance.now()/600+io.z)*0.5;m.z=io.z;
        // grab nearest carrier
        const car=carriers.reduce((a,b)=>Math.abs(b.x-m.x)<Math.abs(a.x-m.x)?b:a);
        if(Math.abs(m.x-car.x)<2&&Math.random()<0.01*rate){io.state='up';io.cx=car.x;io.prog=0;}
      } else if(io.state==='up'){io.prog+=dt*(0.4+rate*0.06);m.x=io.cx+rnd()*0.3;m.z=rnd()*1.5;m.y=lerp(MEMY-4,MEMY+5,io.prog);
        if(io.prog>=1){io.state='high';io.x=io.cx+rnd()*6;io.z=rnd()*8;io.y=MEMY+5+Math.random()*4;}
      } else { m.y=io.y;m.x=io.x+Math.sin(performance.now()/700+io.z)*0.5;m.z=io.z; if(Math.random()<0.002){io.state='low';io.x=rnd()*32;io.z=rnd()*8;io.y=MEMY-4-Math.random()*5;} }
    }
    carriers.forEach(c=>c.mesh.material.emissiveIntensity=.4+0.4*Math.abs(Math.sin(performance.now()/250+c.x)));
  }
  renderer.render(scene,camera);}
if(PREVIEW){orbit.R=56;}
setMode('diff');resize();applyCam();tick();
setTimeout(()=>$('loader').classList.add('hide'),700);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>States of Matter — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--blue:#5fb2ff;--panel:rgba(16,28,46,.55)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .typetoggle{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;backdrop-filter:blur(14px)}
  .typetoggle button{font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--dim);background:transparent;border:0;border-radius:8px;padding:7px 16px;cursor:pointer}
  .typetoggle button.on{background:var(--teal);color:#04302c}
  .info{position:fixed;top:118px;right:14px;z-index:9;width:min(222px,46vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .rr{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:8px}.rr:first-child{margin-top:0}
  .rr .v{font-family:'Fraunces',serif;font-weight:600;font-size:17px}.rr .v.t{color:var(--amber)}.rr .v.st{color:var(--teal)}
  .note{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px clamp(14px,5vw,60px) calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:680px;margin:0 auto}
  .row{display:flex;align-items:center;gap:14px}
  .row .name{flex:0 0 116px;font-weight:600;font-size:14px}
  .row input{flex:1;height:30px;-webkit-appearance:none;appearance:none;border-radius:6px;background:linear-gradient(90deg,#5fb2ff,#2ec4b6 38%,#f6a623 70%,#ff6b6b)}
  .row input::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.5);cursor:pointer}
  .row .val{flex:0 0 64px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--amber)}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
  body.preview .back,body.preview .title,body.preview .typetoggle,body.preview .info,body.preview .ctrl{display:none!important}
</style>
</head>
<body>
  <div id="loader">warming up the particles…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="https://maghimma.github.io/dabble/">← Dabble</a>
  <div class="title">🌡️ States of Matter</div>
  <div class="typetoggle">
    <button id="s-solid" onclick="setState('solid')">Solid</button>
    <button id="s-liquid" class="on" onclick="setState('liquid')">Liquid</button>
    <button id="s-gas" onclick="setState('gas')">Gas</button>
  </div>
  <div class="info">
    <div class="rr"><span>State</span><span class="v st" id="o-state">Liquid</span></div>
    <div class="rr"><span>Temperature</span><span class="v t" id="o-temp">50 °C</span></div>
    <div class="note" id="o-tip"><b>Liquid:</b> particles slide past each other but stay touching — takes the container's shape, keeps its volume.</div>
    <div class="note" style="border:0;padding-top:6px">❄️ Melts at 0 °C&nbsp;&nbsp;·&nbsp;&nbsp;💨 Boils at 100 °C</div>
  </div>
  <div class="ctrl"><div class="wrap2">
    <div class="row"><span class="name">Temperature</span><input type="range" id="temp" min="-20" max="140" step="1" value="50" oninput="onTemp()"><span class="val" id="t-v">50 °C</span></div>
  </div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
const __err=m=>{const l=document.getElementById('loader');if(l){l.style.opacity=1;l.textContent=String(m).slice(0,140);l.style.color='#ff9a8a';}};
window.addEventListener('error',e=>__err('ERR: '+(e.message||e.error)));
import * as THREE from 'three';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));const rnd=()=>Math.random()-0.5;
const PREVIEW=new URLSearchParams(location.search).has('preview');if(PREVIEW)document.body.classList.add('preview');
const canvas=$('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x16283e,90,190);
const camera=new THREE.PerspectiveCamera(50,1,0.1,400);
(()=>{const c=document.createElement('canvas');c.width=8;c.height=256;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#1d3a5c');gr.addColorStop(.6,'#13263c');gr.addColorStop(1,'#0c1b2c');g.fillStyle=gr;g.fillRect(0,0,8,256);scene.background=new THREE.CanvasTexture(c);})();
scene.add(new THREE.HemisphereLight(0xcfe6ff,0x223044,1));
const key=new THREE.DirectionalLight(0xffffff,1.15);key.position.set(20,34,22);key.castShadow=true;key.shadow.mapSize.set(1024,1024);key.shadow.camera.far=120;key.shadow.camera.left=-40;key.shadow.camera.right=40;key.shadow.camera.top=40;key.shadow.camera.bottom=-40;scene.add(key);
scene.add(new THREE.AmbientLight(0xffffff,.32));
// container
const BX=14,BY=17,BZ=14;
const floor=new THREE.Mesh(new THREE.BoxGeometry(BX*2+2,1.2,BZ*2+2),new THREE.MeshStandardMaterial({color:0x24435f,roughness:.9}));floor.position.y=-BY-0.6;floor.receiveShadow=true;scene.add(floor);
const glass=new THREE.Mesh(new THREE.BoxGeometry(BX*2,BY*2,BZ*2),new THREE.MeshStandardMaterial({color:0x86c8e6,transparent:true,opacity:.10,roughness:.05,side:THREE.DoubleSide}));scene.add(glass);
const edges=new THREE.LineSegments(new THREE.EdgesGeometry(glass.geometry),new THREE.LineBasicMaterial({color:0x8fd6e6,transparent:true,opacity:.45}));scene.add(edges);
// particles
const COLS=4,ROWS=3,DEPS=4,N=COLS*ROWS*DEPS;
const geo=new THREE.SphereGeometry(1.7,16,14);
const mesh=[],pos=[],vel=[],lat=[];
for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++)for(let z=0;z<DEPS;z++){
  const lx=(x-(COLS-1)/2)*6.2, ly=(y-(ROWS-1)/2)*6.2-BY+9, lz=(z-(DEPS-1)/2)*6.2;
  lat.push(new THREE.Vector3(lx,ly,lz));
  const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:0x5fb2ff,roughness:.35,metalness:.1,emissive:0x16344f,emissiveIntensity:.4}));
  m.castShadow=true;scene.add(m);mesh.push(m);
  pos.push(new THREE.Vector3(lx,ly,lz));
  vel.push(new THREE.Vector3(rnd()*4,rnd()*4,rnd()*4));
}
let state='liquid', temp=50;
const MELT=0,BOIL=100;
function stateFor(t){return t<MELT?'solid':(t<BOIL?'liquid':'gas');}
function setState(s){const t=s==='solid'?-12:s==='liquid'?50:120;$('temp').value=t;onTemp();}
window.setState=setState;
function onTemp(){temp=+$('temp').value;state=stateFor(temp);refreshUI();}
window.onTemp=onTemp;
function refreshUI(){
  $('t-v').textContent=temp+' °C';$('o-temp').textContent=temp+' °C';
  const name=state==='solid'?'Solid':state==='liquid'?'Liquid':'Gas';
  $('o-state').textContent=name;
  ['solid','liquid','gas'].forEach(s=>$('s-'+s).classList.toggle('on',s===state));
  const tips={solid:'<b>Solid:</b> particles locked in a fixed lattice, only vibrating — definite shape and volume.',
    liquid:'<b>Liquid:</b> particles slide past each other but stay touching — takes the container\'s shape, keeps its volume.',
    gas:'<b>Gas:</b> particles fly in all directions and fill the whole space — no fixed shape or volume.'};
  $('o-tip').innerHTML=tips[state];
  // colour shifts warmer as it heats
  const warm=clamp((temp+20)/160,0,1);
  const col=new THREE.Color().setHSL(0.58-0.12*warm,0.7,0.55+0.05*warm);
  mesh.forEach(m=>m.material.color.copy(col));
}
const orbit={th:0.6,ph:1.05,R:66,tgt:new THREE.Vector3(0,0,0),drag:false,px:0,py:0};
function applyCam(){const{th,ph,R,tgt}=orbit;camera.position.set(tgt.x+R*Math.sin(ph)*Math.sin(th),tgt.y+R*Math.cos(ph),tgt.z+R*Math.sin(ph)*Math.cos(th));camera.lookAt(tgt);}
canvas.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.px)*.006;orbit.ph=clamp(orbit.ph-(e.clientY-orbit.py)*.005,.5,1.4);orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointerup',()=>orbit.drag=false);
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);
const clock=new THREE.Clock();let tt=0;
const R=1.7;
function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.04);tt+=dt;
  if(!orbit.drag)orbit.th+=dt*.05;applyCam();
  if(state==='solid'){
    const amp=0.15+0.5*clamp((temp+20)/20,0,1);
    for(let i=0;i<N;i++){pos[i].set(lat[i].x+amp*Math.sin(tt*9+i),lat[i].y+amp*Math.sin(tt*8+i*1.7),lat[i].z+amp*Math.sin(tt*10+i*2.3));mesh[i].position.copy(pos[i]);}
  }else{
    const gas=state==='gas';
    const target=gas?(20+0.18*(temp-BOIL)):(5+0.09*(temp-MELT)); // target speed
    const surfaceY=gas?BY:(-BY+ (2*BY)*0.55);                    // liquid sits in lower ~55%
    for(let i=0;i<N;i++){
      const p=pos[i],v=vel[i];
      if(!gas)v.y-=24*dt;                      // gravity for liquid
      v.x+=rnd()*target*dt*2.2;v.y+=rnd()*target*dt*2.2;v.z+=rnd()*target*dt*2.2; // thermal jitter
      p.addScaledVector(v,dt);
      // walls
      if(p.x<-BX+R){p.x=-BX+R;v.x=Math.abs(v.x);} if(p.x>BX-R){p.x=BX-R;v.x=-Math.abs(v.x);}
      if(p.z<-BZ+R){p.z=-BZ+R;v.z=Math.abs(v.z);} if(p.z>BZ-R){p.z=BZ-R;v.z=-Math.abs(v.z);}
      if(p.y<-BY+R){p.y=-BY+R;v.y=Math.abs(v.y)*(gas?1:0.6);}
      if(p.y>surfaceY-R){p.y=surfaceY-R;v.y=-Math.abs(v.y)*(gas?1:0.5);}
      // keep speed near target
      const sp=v.length();if(sp>0.001){const f=THREE.MathUtils.lerp(sp,target,0.06)/sp;v.multiplyScalar(clamp(f,0.5,1.6));}
      mesh[i].position.copy(p);
    }
  }
  renderer.render(scene,camera);}
if(PREVIEW){$('temp').value=-8;orbit.R=64;}
onTemp();resize();applyCam();tick();
setTimeout(()=>$('loader').classList.add('hide'),700);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Le Chatelier (Equilibrium) — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--panel:rgba(16,28,46,.55)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .eqn{position:fixed;top:48px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-size:15px}.eqn b{color:#c98a4a}.eqn .p{color:#9fd0e0}.eqn small{display:block;font-family:'Hanken Grotesk';font-size:11px;color:var(--dim);margin-top:2px}
  .info{position:fixed;top:100px;right:14px;z-index:9;width:min(232px,52vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .state{font-family:'Fraunces',serif;font-size:19px;text-align:center}
  .note{font-size:11.5px;color:var(--dim);line-height:1.55;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px;min-height:48px}.note b{color:var(--amber)}.note .r{color:#c98a4a}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px clamp(14px,5vw,60px) calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:680px;margin:0 auto}
  .row{display:flex;align-items:center;gap:14px;margin-top:10px}.row:first-child{margin-top:0}
  .row .name{flex:0 0 120px;font-weight:600;font-size:14px}
  .row input{flex:1;height:30px}
  #temp{accent-color:#ff7a4a}#pres{accent-color:#9fb6cf}
  .row .val{flex:0 0 92px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--teal)}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
  body.preview .back,body.preview .title,body.preview .eqn,body.preview .info,body.preview .ctrl{display:none!important}
</style>
</head>
<body>
  <div id="loader">sealing the gas tube…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="index.html">← Dabble</a>
  <div class="title">⚖️ Le Chatelier</div>
  <div class="eqn"><span class="p">N₂O₄</span> (pale) ⇌ <b>2NO₂</b> (brown)<small>forward is endothermic (takes in heat) · 1 gas molecule → 2</small></div>
  <div class="info">
    <div class="state" id="o-state">—</div>
    <div style="height:14px;border-radius:7px;margin:9px 0 3px;background:linear-gradient(90deg,#dfeef4,#b05a22);position:relative"><span id="o-ndl" style="position:absolute;top:-3px;width:4px;height:20px;background:#fff;border-radius:2px;box-shadow:0 0 3px rgba(0,0,0,.5);left:50%"></span></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim)"><span>pale N₂O₄</span><span id="o-pct" style="color:var(--ink);font-weight:700">—</span><span>brown NO₂</span></div>
    <div class="note" id="o-note">Heat the water bath or squeeze the syringe — watch the gas change colour as the equilibrium shifts.</div>
  </div>
  <div class="ctrl"><div class="wrap2">
    <div class="row"><span class="name">Temperature</span><input type="range" id="temp" min="0" max="100" step="2" value="50" oninput="change('temp')"><span class="val" id="temp-v">warm</span></div>
    <div class="row"><span class="name">Pressure (syringe)</span><input type="range" id="pres" min="0" max="100" step="2" value="35" oninput="change('pres')"><span class="val" id="pres-v">low</span></div>
  </div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
const __err=m=>{const l=document.getElementById('loader');if(l){l.style.opacity=1;l.textContent=String(m).slice(0,150);l.style.color='#ff9a8a';}};
window.addEventListener('error',e=>__err('ERR: '+(e.message||e.error)));
import * as THREE from 'three';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));const rnd=()=>Math.random()-0.5;const lerp=(a,b,t)=>a+(b-a)*t;
const PREVIEW=new URLSearchParams(location.search).has('preview');if(PREVIEW)document.body.classList.add('preview');
const canvas=$('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x16283e,90,200);
const camera=new THREE.PerspectiveCamera(50,1,0.1,400);
(()=>{const c=document.createElement('canvas');c.width=8;c.height=256;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#24405c');gr.addColorStop(.6,'#15293f');gr.addColorStop(1,'#0c1b2c');g.fillStyle=gr;g.fillRect(0,0,8,256);scene.background=new THREE.CanvasTexture(c);})();
scene.add(new THREE.HemisphereLight(0xcfe6ff,0x202a38,.9));
const key=new THREE.DirectionalLight(0xffffff,1.35);key.position.set(16,30,18);key.castShadow=true;key.shadow.mapSize.set(1024,1024);key.shadow.camera.near=1;key.shadow.camera.far=120;key.shadow.camera.left=-34;key.shadow.camera.right=34;key.shadow.camera.top=34;key.shadow.camera.bottom=-34;key.shadow.bias=-0.0004;scene.add(key);
scene.add(new THREE.AmbientLight(0xffffff,.28));
function lab(text,x,y,z,col){const t=document.createElement('canvas').getContext('2d');t.font='600 30px Hanken Grotesk,sans-serif';const w=Math.ceil(t.measureText(text).width)+24;const c=document.createElement('canvas');c.width=w;c.height=46;const g=c.getContext('2d');g.font='600 30px Hanken Grotesk,sans-serif';g.fillStyle=col;g.textAlign='center';g.textBaseline='middle';g.fillText(text,w/2,25);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,depthTest:false}));s.scale.set(2.4*w/46,2.4,1);s.position.set(x,y,z);scene.add(s);return s;}
const FLOOR=-12;
const bench=new THREE.Mesh(new THREE.BoxGeometry(70,4,44),new THREE.MeshStandardMaterial({color:0x2b3a4d,roughness:.9}));bench.position.y=FLOOR-2;bench.receiveShadow=true;scene.add(bench);
// water bath beaker
const BR=11,BH=15;
const bath=new THREE.Mesh(new THREE.CylinderGeometry(BR,BR,BH,48,1,true),new THREE.MeshStandardMaterial({color:0xbfe2f0,transparent:true,opacity:.14,roughness:.06,side:THREE.DoubleSide}));bath.position.y=FLOOR+BH/2;scene.add(bath);
const bathBase=new THREE.Mesh(new THREE.CylinderGeometry(BR,BR*.96,1.2,48),new THREE.MeshStandardMaterial({color:0xbfe2f0,transparent:true,opacity:.28}));bathBase.position.y=FLOOR+.6;scene.add(bathBase);
const water=new THREE.Mesh(new THREE.CylinderGeometry(BR-.5,BR-.5,BH-3,40),new THREE.MeshStandardMaterial({color:0x4a90d9,transparent:true,opacity:.34,roughness:.2}));water.position.y=FLOOR+(BH-3)/2+.6;scene.add(water);
lab('water bath',0,FLOOR-3.6,0,'#9fc4ff');
// gas tube (sealed) standing in the bath
const GR=3.6, gasFloor=FLOOR+1.5, tubeTop=22;
const tube=new THREE.Mesh(new THREE.CylinderGeometry(GR+.5,GR+.5,tubeTop-gasFloor,40,1,true),new THREE.MeshStandardMaterial({color:0xdaf0fb,transparent:true,opacity:.14,roughness:.05,side:THREE.DoubleSide}));tube.position.y=(gasFloor+tubeTop)/2;scene.add(tube);
const tubeBase=new THREE.Mesh(new THREE.CylinderGeometry(GR+.5,GR+.5,.8,40),new THREE.MeshStandardMaterial({color:0xdaf0fb,transparent:true,opacity:.3}));tubeBase.position.y=gasFloor;scene.add(tubeBase);
// gas tint cylinder (recoloured by NO2 fraction); height tracks plunger
const gas=new THREE.Mesh(new THREE.CylinderGeometry(GR,GR,1,32),new THREE.MeshStandardMaterial({color:0xb87a3a,transparent:true,opacity:.3,roughness:.4}));scene.add(gas);
// plunger (syringe piston)
const plunger=new THREE.Group();const disc=new THREE.Mesh(new THREE.CylinderGeometry(GR+.3,GR+.3,1.2,32),new THREE.MeshStandardMaterial({color:0x3a4654,roughness:.5}));plunger.add(disc);const rod=new THREE.Mesh(new THREE.CylinderGeometry(.6,.6,6,12),new THREE.MeshStandardMaterial({color:0x9fb0c0,metalness:.4,roughness:.4}));rod.position.y=3.6;plunger.add(rod);plunger.traverse(o=>o.castShadow=true);scene.add(plunger);
lab('gas syringe',0,tubeTop+2.5,0,'#ffcf8a');
// molecules
const N=26,parts=[];const mNO2=new THREE.MeshStandardMaterial({color:0xc06020,emissive:0x4a1c08,emissiveIntensity:.55,roughness:.4});const mN2O4=new THREE.MeshStandardMaterial({color:0xe9f4fa,emissive:0x2a3a44,emissiveIntensity:.3,roughness:.3});
const pg=new THREE.SphereGeometry(.95,14,12);
for(let i=0;i<N;i++){const m=new THREE.Mesh(pg,mN2O4);m.castShadow=true;m.position.set(rnd()*2*(GR-1),gasFloor+1+Math.random()*8,rnd()*2*(GR-1));scene.add(m);parts.push({m,no2:false,v:new THREE.Vector3(rnd(),rnd(),rnd()).multiplyScalar(7)});}
let lastF=0.5;
function frac(){const T=+$('temp').value,P=+$('pres').value;return clamp(0.5+(T-50)/95-(P-50)/120,0.05,0.95);}
function change(which){
  const T=+$('temp').value,P=+$('pres').value;
  $('temp-v').textContent=T<25?'cold ❄️':T<55?'warm':'hot 🔥';$('pres-v').textContent=P<35?'low':P<65?'medium':'high';
  const f=frac();const up=f>lastF+0.005,dn=f<lastF-0.005;
  if(which==='temp')$('o-note').innerHTML=(T> (lastT??50))?'You <b>heated</b> it. The forward reaction is <b>endothermic</b>, so heat pushes it toward <b class="r">more NO₂ (browner)</b> → shifts right.':'You <b>cooled</b> it. Less heat favours the exothermic reverse → <b class="p" style="color:#9fd0e0">more N₂O₄ (paler)</b> → shifts left.';
  else if(which==='pres')$('o-note').innerHTML=(P> (lastP??50))?'You <b>increased pressure</b>. The system shifts to the side with <b>fewer molecules (N₂O₄)</b> → <b class="p" style="color:#9fd0e0">paler</b>.':'You <b>lowered pressure</b>. It shifts to the side with <b>more molecules (NO₂)</b> → <b class="r">browner</b>.';
  $('o-state').innerHTML=f>0.6?'<span style="color:#c98a4a">Brown — mostly NO₂</span>':f<0.4?'<span style="color:#9fd0e0">Pale — mostly N₂O₄</span>':'In between';
  lastT=T;lastP=P;
}
let lastT=50,lastP=35;window.change=change;
const orbit={th:0.4,ph:1.0,R:54,tgt:new THREE.Vector3(0,4,0),drag:false,px:0,py:0};
function applyCam(){const{th,ph,R,tgt}=orbit;camera.position.set(tgt.x+R*Math.sin(ph)*Math.sin(th),tgt.y+R*Math.cos(ph),tgt.z+R*Math.sin(ph)*Math.cos(th));camera.lookAt(tgt);}
function zoom(f){orbit.R=clamp(orbit.R*f,22,130);applyCam();}
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?1.08:0.926);},{passive:false});
(function(){var z=document.createElement('div');z.style.cssText='position:fixed;left:16px;bottom:150px;z-index:14;display:flex;flex-direction:column;gap:7px';var bp=document.createElement('button'),bm=document.createElement('button');bp.textContent='+';bm.textContent='−';[bp,bm].forEach(function(x){x.style.cssText='width:40px;height:40px;border-radius:11px;border:1px solid rgba(234,241,247,.18);background:rgba(16,28,46,.62);color:#eaf1f7;font-size:22px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px)';});bp.onclick=function(){zoom(0.8);};bm.onclick=function(){zoom(1.25);};z.appendChild(bp);z.appendChild(bm);document.body.appendChild(z);if(document.body.classList.contains('preview'))z.style.display='none';})();
canvas.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.px)*.006;orbit.ph=clamp(orbit.ph-(e.clientY-orbit.py)*.005,.45,1.4);orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointerup',()=>orbit.drag=false);
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);
const clock=new THREE.Clock();const brown=new THREE.Color(0xb87a3a),pale=new THREE.Color(0xdfeef4);
function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.04);if(!orbit.drag)orbit.th+=dt*.05;applyCam();
  const f=frac();lastF=lerp(lastF,f,0.05);
  const P=+$('pres').value;const plungerY=lerp(tubeTop-1.5,gasFloor+7,P/100);
  // gas column from gasFloor to plungerY
  const gh=plungerY-gasFloor;gas.scale.y=gh;gas.position.y=gasFloor+gh/2;
  gas.material.color.copy(pale).lerp(brown,lastF);gas.material.opacity=0.18+0.6*lastF;$('o-pct').textContent=Math.round(lastF*100)+'% NO₂';$('o-ndl').style.left=(lastF*100)+'%';
  plunger.position.y=plungerY+0.6;
  // water bath colour by temp
  const T=+$('temp').value;water.material.color.set(0x4a90d9).lerp(new THREE.Color(0xd9694a),clamp((T-20)/80,0,1));
  // molecules: ratio -> NO2 fraction; bounce within gas column
  const target=Math.round(N*lastF);let cur=parts.filter(p=>p.no2).length;
  if(cur<target){const p=parts.find(x=>!x.no2);if(p&&Math.random()<.3){p.no2=true;p.m.material=mNO2;}}
  else if(cur>target){const p=parts.find(x=>x.no2);if(p&&Math.random()<.3){p.no2=false;p.m.material=mN2O4;}}
  for(const p of parts){const v=p.v,m=p.m.position;m.addScaledVector(v,dt);
    const r=Math.hypot(m.x,m.z),lim=GR-1;if(r>lim){const nx=m.x/r,nz=m.z/r;m.x=nx*lim;m.z=nz*lim;const d=v.x*nx+v.z*nz;v.x-=2*d*nx;v.z-=2*d*nz;}
    if(m.y<gasFloor+1){m.y=gasFloor+1;v.y=Math.abs(v.y);}if(m.y>plungerY-1){m.y=plungerY-1;v.y=-Math.abs(v.y);}
    const s=v.length(),tgt=6+T*0.05;if(s>0.01)v.multiplyScalar(clamp(tgt/s,0.7,1.3));}
  renderer.render(scene,camera);}
if(PREVIEW){$('temp').value=85;orbit.R=58;}
change();resize();applyCam();tick();
setTimeout(()=>$('loader').classList.add('hide'),700);
</script>
</body>
</html>

const MAT=new THREE.MeshStandardMaterial({color:0x2ec4b6,transparent:true,opacity:.8,roughness:.3,metalness:.1,side:THREE.DoubleSide});

function faceQuat(normal,width){const z=normal.clone().normalize();const x=width.clone().normalize();const y=new THREE.Vector3().crossVectors(z,x).normalize();return new THREE.Quaternion().setFromRotationMatrix(new THREE.Matrix4().makeBasis(x,y,z));}

function boxNet(l,h,w){const grp=new THREE.Group();const F=[];
  function f(W,H,aN,aW,aP,fN,fW,fP){const g=netFace(W,H,aN,aW,aP,fN,fW,fP);grp.add(g);F.push(g);}
  const zf=w/2+h/2, zb=-(w/2+h/2), zt=w/2+h+w/2, xr=l/2+h/2, xl=-(l/2+h/2);

  f(l,w, V(0,1,0),V(1,0,0),V(0,h/2,0),   V(0,1,0),V(-1,0,0),V(0,0,zt));     // top

function polyFace(aV,fV){const n=aV.length;const geo=new THREE.BufferGeometry();const pos=new Float32Array(n*3);geo.setAttribute('position',new THREE.BufferAttribute(pos,3));const idx=[];for(let i=1;i<n-1;i++)idx.push(0,i,i+1);geo.setIndex(idx);

   solve:()=>{const b=ri(3,9),h=ri(3,10);const l=Math.sqrt((b/2)**2+h*h);return{D:{b,h},prompt:'A square-based pyramid has base <b>'+b+' cm</b> and height <b>'+h+' cm</b>. Find its slant height <i>l</i>.',ans:l,u:'cm',w:'l = √((b⁄2)² + h²) = √('+f(b/2)+'² + '+h+'²) ≈ '+f(l)+' cm'};}},
 {n:'Rectangular pyramid',d:[['l','base length l',2,10,6],['w','base width w',2,10,4],['h','height h',1,12,6]],mesh:D=>{const m=meshOf(new THREE.ConeGeometry(1,D.h,4));m.rotation.y=PI/4;m.scale.set(D.l/Math.SQRT2,1,D.w/Math.SQRT2);return m;},
   calc:D=>{const l1=Math.sqrt((D.w/2)**2+D.h*D.h),l2=Math.sqrt((D.l/2)**2+D.h*D.h);return[['Slant heights','l₁=√((w⁄2)²+h²) · l₂=√((l⁄2)²+h²)',f(l1)+' & '+f(l2)+' cm',1],['Volume','V = ⅓ lwh',f(D.l*D.w*D.h/3)+' cm³',0],['Curved SA','A = l·l₁ + w·l₂',f(D.l*l1+D.w*l2)+' cm²',1],['Total SA','A = lw + l·l₁ + w·l₂',f(D.l*D.w+D.l*l1+D.w*l2)+' cm²',0]];},
   solve:()=>{const l=ri(3,8),w=ri(2,7),h=ri(3,10);const V=Math.round(l*w*h/3);return{D:{l,w,h},prompt:'A rectangular-based pyramid has <b>volume '+V+' cm³</b>, base length '+l+' cm and width '+w+' cm. Find its height.',ans:3*V/(l*w),u:'cm',w:'V = ⅓lwh → h = 3V ÷ (lw) = '+(3*V)+' ÷ '+(l*w)+' ≈ '+f(3*V/(l*w))+' cm'};}},
 {n:'Triangular prism',d:[['a','side a',1,10,5],['L','length L',1,14,8]],mesh:D=>{const m=meshOf(new THREE.CylinderGeometry(D.a/Math.sqrt(3),D.a/Math.sqrt(3),D.L,3));m.rotation.y=PI/6;m.rotation.z=PI/2;return m;},
   calc:D=>{const base=Math.sqrt(3)/4*D.a*D.a;return[['Base area (equilat.)','= (√3⁄4) a²',f(base)+' cm²',1],['Volume','V = base × L',f(base*D.L)+' cm³',0],['Curved SA','A = 3aL',f(3*D.a*D.L)+' cm²',1],['Total SA','A = 2×base + 3aL',f(2*base+3*D.a*D.L)+' cm²',0]];},
   solve:()=>{const a=ri(3,8),L=ri(4,12);const base=Math.sqrt(3)/4*a*a;const V=Math.round(base*L);return{D:{a,L},prompt:'An equilateral triangular prism has <b>volume '+V+' cm³</b> and triangle side '+a+' cm. Find its length L.',ans:V/base,u:'cm',w:'V = (√3⁄4)a² × L → L = V ÷ base = '+V+' ÷ '+f(base)+' ≈ '+f(V/base)+' cm'};}},
 {n:'Cone frustum',d:[['R','base R',2,9,5],['r','top r',1,6,2],['h','height h',1,12,6]],mesh:D=>meshOf(new THREE.CylinderGeometry(D.r,D.R,D.h,48)),
   calc:D=>{const l=Math.sqrt((D.R-D.r)**2+D.h*D.h);return[['Slant height','l = √((R−r)² + h²)',f(l)+' cm',1],['Volume','V = ⅓πh(R² + Rr + r²)',f(PI*D.h*(D.R*D.R+D.R*D.r+D.r*D.r)/3)+' cm³',0],['Curved SA','A = π(R + r)l',f(PI*(D.R+D.r)*l)+' cm²',1],['Total SA','+ πR² + πr²',f(PI*(D.R+D.r)*l+PI*D.R*D.R+PI*D.r*D.r)+' cm²',0]];},
   solve:()=>{const R=ri(4,9),r=ri(1,3),h=ri(3,10);const l=Math.sqrt((R-r)**2+h*h);return{D:{R,r,h},prompt:'A frustum has base radius <b>'+R+'</b>, top radius <b>'+r+'</b> and height <b>'+h+' cm</b>. Find its slant height <i>l</i>.',ans:l,u:'cm',w:'l = √((R−r)² + h²) = √('+(R-r)+'² + '+h+'²) ≈ '+f(l)+' cm'};}}
];
let si=0,D={},solid=null,solveMode=false,cur=null;
let netMode=false,unfoldT=0,unfoldTarget=0,netObj=null;
const NETABLE={0:true,1:true,6:true,7:true,8:true};
function buildNet(reframe){if(netObj)scene.remove(netObj);
  if(si===0)netObj=boxNet(D.a,D.a,D.a);
  else if(si===1)netObj=boxNet(D.l,D.h,D.w);
  else if(si===6)netObj=makeNet(sqPyrFaces(D.b,D.h));
  else if(si===7)netObj=makeNet(rectPyrFaces(D.l,D.w,D.h));
  else if(si===8)netObj=makeNet(triPrismFaces(D.a,D.L));
  else return;
  if(reframe){netObj.setUnfold(1);const bb=new THREE.Box3().setFromObject(netObj);const sz=bb.getSize(new THREE.Vector3());orbit.R=Math.max(sz.x,sz.y,sz.z)*0.8+10;}
  netObj.setUnfold(unfoldT);scene.add(netObj);}
function toggleNet(){if(!NETABLE[si])return;netMode=!netMode;$('netBtn').classList.toggle('on',netMode);
  if(netMode){buildNet(true);if(solid)solid.visible=false;unfoldTarget=1;}
  else{unfoldTarget=0;}}
window.toggleNet=toggleNet;
function buildShapeButtons(){$('shapes').innerHTML=S.map((s,i)=>`<button class="${i===si?'on':''}" onclick="pick(${i})">${s.n}</button>`).join('');}
function buildSliders(){const s=S[si];$('sliders').innerHTML=s.d.map(d=>`<div class="row"><span class="name">${d[1]}</span><input type="range" id="d_${d[0]}" min="${d[2]}" max="${d[3]}" step="0.5" value="${D[d[0]]}" oninput="setDim('${d[0]}',this.value)"><span class="val" id="dv_${d[0]}">${D[d[0]]}</span></div>`).join('');}
function setDim(k,v){D[k]=+v;$('dv_'+k).textContent=v;rebuild(false);if(netMode){if(solid)solid.visible=false;buildNet(false);}}
window.setDim=setDim;
function rebuild(reframe){if(solid)scene.remove(solid);solid=S[si].mesh(D);scene.add(solid);
  const b=new THREE.Box3().setFromObject(solid);const c=b.getCenter(new THREE.Vector3());solid.position.sub(c);
  if(reframe){const sz=b.getSize(new THREE.Vector3());orbit.R=Math.max(sz.x,sz.y,sz.z)*2.3+9;}
  info();}
function info(){const s=S[si];$('o-name').textContent=s.n;
  $('o-frm').innerHTML=s.calc(D).map(r=>`<div class="frm ${r[3]?'amb':''}"><span class="l">${r[0]}</span><br><span class="e">${r[1]}</span> &nbsp;<span class="val">= ${r[2]}</span></div>`).join('');}
function pick(i){si=i;D={};S[i].d.forEach(d=>D[d[0]]=d[4]);if(netObj){scene.remove(netObj);netObj=null;}netMode=false;unfoldT=0;unfoldTarget=0;buildShapeButtons();buildSliders();rebuild(true);if(solid)solid.visible=true;$('netBtn').classList.remove('on');$('netBtn').style.display=(NETABLE[i]&&!solveMode)?'inline-block':'none';if(solveMode)newQ();}
window.pick=pick;
function toggleSolve(){solveMode=!solveMode;if(netMode){netMode=false;$('netBtn').classList.remove('on');if(netObj){scene.remove(netObj);netObj=null;}unfoldT=0;unfoldTarget=0;}$('modeBtn').classList.toggle('on',solveMode);$('solve').classList.toggle('on',solveMode);$('sliders').style.display=solveMode?'none':'block';$('netBtn').style.display=(NETABLE[si]&&!solveMode)?'inline-block':'none';if(solveMode)newQ();else{D={};S[si].d.forEach(d=>D[d[0]]=d[4]);buildSliders();rebuild(true);if(solid)solid.visible=true;}}
window.toggleSolve=toggleSolve;
function newQ(){cur=S[si].solve();D=Object.assign({},cur.D);rebuild(true);$('q').innerHTML='🎯 '+cur.prompt;$('ansin').value='';$('fb').textContent='';$('fb').className='fb';
  // hide the asked quantity from the info panel by showing only the shape name in solve
  $('o-frm').innerHTML='<div class="frm"><span class="l">Solve for the missing value</span></div>';}
window.newQ=newQ;
function checkAns(){if(!cur)return;const g=parseFloat($('ansin').value);const fb=$('fb');
  if(isNaN(g)){fb.className='fb';fb.textContent='Type a number first.';return;}
  const ok=Math.abs(g-cur.ans)<=Math.max(0.1,cur.ans*0.03);
  fb.className='fb '+(ok?'ok':'no');
  fb.innerHTML=(ok?'✓ Correct! ':'✗ Not quite (answer ≈ '+f(cur.ans)+' '+cur.u+'). ')+'<br><b>Working:</b> '+cur.w;}
window.checkAns=checkAns;
const orbit={th:0.6,ph:1.0,R:24,tgt:new THREE.Vector3(0,0,0),drag:false,px:0,py:0};
function applyCam(){const{th,ph,R,tgt}=orbit;camera.position.set(tgt.x+R*Math.sin(ph)*Math.sin(th),tgt.y+R*Math.cos(ph),tgt.z+R*Math.sin(ph)*Math.cos(th));camera.lookAt(tgt);}
function zoom(f){orbit.R=clamp(orbit.R*f,5,200);applyCam();}
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?1.08:0.926);},{passive:false});
(function(){var z=document.createElement('div');z.style.cssText='position:fixed;left:16px;bottom:150px;z-index:14;display:flex;flex-direction:column;gap:7px';var bp=document.createElement('button'),bm=document.createElement('button');bp.textContent='+';bm.textContent='−';[bp,bm].forEach(function(x){x.style.cssText='width:40px;height:40px;border-radius:11px;border:1px solid rgba(234,241,247,.18);background:rgba(16,28,46,.62);color:#eaf1f7;font-size:22px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px)';});bp.onclick=function(){zoom(0.8);};bm.onclick=function(){zoom(1.25);};z.appendChild(bp);z.appendChild(bm);document.body.appendChild(z);})();
canvas.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.px)*.006;orbit.ph=clamp(orbit.ph-(e.clientY-orbit.py)*.005,.3,1.5);orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointerup',()=>orbit.drag=false);
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);
const clock=new THREE.Clock();
function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.05);if(!orbit.drag)orbit.th+=dt*.25;
  if(netObj){unfoldT+=(unfoldTarget-unfoldT)*Math.min(1,dt*4);netObj.setUnfold(unfoldT);if(unfoldTarget===0&&unfoldT<0.02){scene.remove(netObj);netObj=null;if(solid)solid.visible=true;}}
  applyCam();renderer.render(scene,camera);}
pick(0);resize();applyCam();tick();
setTimeout(()=>$('loader').classList.add('hide'),700);
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Heart &amp; Circulation — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--red:#ff6b6b;--blue:#5b9bff;--panel:rgba(16,28,46,.6)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .hint{position:fixed;top:54px;left:0;right:0;text-align:center;z-index:8;color:var(--dim);font-size:11px;letter-spacing:.16em;text-transform:uppercase;pointer-events:none}
  .info{position:fixed;top:80px;right:14px;z-index:9;width:min(220px,48vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .leg{font-size:12px;line-height:1.9}.leg i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .note{font-size:11.5px;color:var(--dim);line-height:1.55;margin-top:9px;border-top:1px dashed var(--line);padding-top:9px}.note b{color:#fff}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px clamp(14px,5vw,60px) calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .wrap2 .name{flex:0 0 100px;font-weight:600;font-size:14px}
  .wrap2 input{flex:1;accent-color:var(--red);height:30px}
  .wrap2 .val{flex:0 0 84px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--red)}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
  body.preview .back,body.preview .title,body.preview .hint,body.preview .info,body.preview .ctrl{display:none!important}
</style>
</head>
<body>
  <div id="loader">building the heart…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="https://maghimma.github.io/dabble/">← Dabble</a>
  <div class="title">❤️ The Heart (3D)</div>
  <div class="hint">drag to rotate ↻</div>
  <div class="info">
    <div class="leg"><i style="background:#5b9bff"></i>deoxygenated blood<br><i style="background:#ff6b6b"></i>oxygenated blood</div>
    <div class="note"><b>Double circulation:</b> blood goes through the heart twice each loop — to the lungs, then to the body. The <b>left ventricle</b> has the thickest wall (it pumps all round the body).</div>
  </div>
  <div class="ctrl"><div class="wrap2"><span class="name">Heart rate</span><input type="range" id="bpm" min="40" max="180" step="2" value="72" oninput="upd()"><span class="val" id="bpm-v">72 bpm</span></div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
const __err=m=>{const l=document.getElementById('loader');if(l){l.style.opacity=1;l.textContent=String(m).slice(0,150);l.style.color='#ff9a8a';}};
window.addEventListener('error',e=>__err('ERR: '+(e.message||e.error)));
import * as THREE from 'three';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const PREVIEW=new URLSearchParams(location.search).has('preview');if(PREVIEW)document.body.classList.add('preview');
const canvas=$('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x16283e,80,180);
const camera=new THREE.PerspectiveCamera(50,1,0.1,400);
(()=>{const c=document.createElement('canvas');c.width=8;c.height=256;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#27384f');gr.addColorStop(.6,'#16283c');gr.addColorStop(1,'#0c1b2c');g.fillStyle=gr;g.fillRect(0,0,8,256);scene.background=new THREE.CanvasTexture(c);})();
scene.add(new THREE.HemisphereLight(0xffe0e0,0x223044,1));
const key=new THREE.DirectionalLight(0xffffff,1.25);key.position.set(14,22,20);scene.add(key);
const fill=new THREE.DirectionalLight(0x88aaff,.4);fill.position.set(-16,4,-10);scene.add(fill);scene.add(new THREE.AmbientLight(0xffffff,.3));
function lab(text,x,y,z,col){const c=document.createElement('canvas');c.width=320;c.height=64;const g=c.getContext('2d');g.fillStyle=col;g.font='600 30px Hanken Grotesk,sans-serif';g.textAlign='center';g.textBaseline='middle';g.fillText(text,160,36);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,depthTest:false}));s.scale.set(11,2.2,1);s.position.set(x,y,z);scene.add(s);return s;}
// ---- heart muscle (stylised) ----
const heart=new THREE.Group();scene.add(heart);
const musc=new THREE.MeshStandardMaterial({color:0x9c2c38,roughness:.55,metalness:.05,emissive:0x300810,emissiveIntensity:.35});
const muscR=new THREE.MeshStandardMaterial({color:0xb23a48,roughness:.55,emissive:0x3a0c14,emissiveIntensity:.35});
const lobeL=new THREE.Mesh(new THREE.SphereGeometry(5,40,32),muscR);lobeL.position.set(-2.7,2.4,0);lobeL.scale.set(1,1.05,.95);heart.add(lobeL);
const lobeR=new THREE.Mesh(new THREE.SphereGeometry(5,40,32),musc);lobeR.position.set(2.7,2.4,0);lobeR.scale.set(1,1.05,.95);heart.add(lobeR);
const apex=new THREE.Mesh(new THREE.ConeGeometry(6.6,13,40),musc);apex.position.set(0,-3.5,0);apex.rotation.x=Math.PI;heart.add(apex);
heart.traverse(o=>{if(o.isMesh){o.castShadow=true;}});
// ---- great vessels (tubes) ----
function tube(pts,r,col){const cv=new THREE.CatmullRomCurve3(pts.map(p=>new THREE.Vector3(...p)));const m=new THREE.Mesh(new THREE.TubeGeometry(cv,40,r,16,false),new THREE.MeshStandardMaterial({color:col,roughness:.5,emissive:col,emissiveIntensity:.12}));heart.add(m);return m;}
tube([[1,4,1],[1.5,11,1.5],[5.5,15,0],[8.5,11,-1]],1.5,0xc0392b);     // aorta (red, arches right)
tube([[-1.5,4,1.5],[-2,11,1],[-5,14,-0.5]],1.4,0x3b6fb0);            // pulmonary artery (blue)
tube([[6.2,6,-1.5],[7.2,14,-2.5]],1.5,0x3b6fb0);                     // vena cava (blue)
tube([[6,1,-2.5],[8,-3,-3]],1.3,0x3b6fb0);                           // inferior vena cava
tube([[-6,5,-2],[-8.5,10,-3]],1.3,0xc0392b);                         // pulmonary vein (red)
// labels
lab('Right atrium',5.2,5.5,3,'#9fc4ff');lab('Left atrium',-5.4,5.5,3,'#ffb3b3');
lab('Right ventricle',5.6,-3,3.5,'#9fc4ff');lab('Left ventricle',-5.6,-3,3.5,'#ffb3b3');
lab('Aorta',10.5,12,-1,'#ffb3b3');lab('Pulmonary artery',-6.5,15.5,0,'#9fc4ff');
lab('Vena cava',9.5,15,-3,'#9fc4ff');lab('Pulmonary vein',-10.5,11.5,-3,'#ffb3b3');
// ---- blood flow path ----
const FP=[[7.2,13,-2.5],[3,4.5,1.5],[2.6,-4,2],[0.5,-8.5,1],[-1.5,11,1],[-7.5,9,-2.5],[-3,4.5,1.5],[-2.6,-4,2],[0,-9,1],[6.5,14,-0.5],[9,2,-2.5],[8.5,9,-3]];
const flow=new THREE.CatmullRomCurve3(FP.map(p=>new THREE.Vector3(...p)),true);const FL=flow.getLength();
const SPLIT=0.42; // up to ~lungs = deoxygenated
const dgeo=new THREE.SphereGeometry(0.62,10,10);
const blue=new THREE.MeshStandardMaterial({color:0x5b9bff,emissive:0x244a8a,emissiveIntensity:.8});
const red=new THREE.MeshStandardMaterial({color:0xff6b6b,emissive:0x7a1f24,emissiveIntensity:.8});
const dots=[];for(let i=0;i<24;i++){const m=new THREE.Mesh(dgeo,blue);heart.add(m);dots.push({m,u:i/24});}
let bpm=72;function upd(){bpm=+$('bpm').value;$('bpm-v').textContent=bpm+' bpm';}window.upd=upd;
const orbit={th:0.5,ph:1.05,R:42,tgt:new THREE.Vector3(0,1,0),drag:false,px:0,py:0};
function applyCam(){const{th,ph,R,tgt}=orbit;camera.position.set(tgt.x+R*Math.sin(ph)*Math.sin(th),tgt.y+R*Math.cos(ph),tgt.z+R*Math.sin(ph)*Math.cos(th));camera.lookAt(tgt);}
function zoom(f){orbit.R=clamp(orbit.R*f,16,120);applyCam();}
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?1.08:0.926);},{passive:false});
(function(){var z=document.createElement('div');z.style.cssText='position:fixed;left:16px;bottom:132px;z-index:14;display:flex;flex-direction:column;gap:7px';var bp=document.createElement('button'),bm=document.createElement('button');bp.textContent='+';bm.textContent='−';[bp,bm].forEach(function(x){x.style.cssText='width:40px;height:40px;border-radius:11px;border:1px solid rgba(234,241,247,.18);background:rgba(16,28,46,.62);color:#eaf1f7;font-size:22px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px)';});bp.onclick=function(){zoom(0.8);};bm.onclick=function(){zoom(1.25);};z.appendChild(bp);z.appendChild(bm);document.body.appendChild(z);if(document.body.classList.contains('preview'))z.style.display='none';})();
canvas.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.px)*.006;orbit.ph=clamp(orbit.ph-(e.clientY-orbit.py)*.005,.4,1.45);orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointerup',()=>orbit.drag=false);
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);
const clock=new THREE.Clock(),tmp=new THREE.Vector3();let beat=0;
function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.05);if(!orbit.drag)orbit.th+=dt*.18;applyCam();
  const sp=bpm/72*0.1;
  for(const d of dots){d.u=(d.u+dt*sp)%1;flow.getPointAt(d.u,tmp);d.m.position.copy(tmp);if(d.m.material!==(d.u<SPLIT?blue:red))d.m.material=d.u<SPLIT?blue:red;}
  beat+=dt*bpm/60*2*Math.PI;const s=1+0.05*Math.max(0,Math.sin(beat));heart.scale.setScalar(s);
  renderer.render(scene,camera);}
if(PREVIEW){orbit.R=46;}
upd();resize();applyCam();tick();
setTimeout(()=>$('loader').classList.add('hide'),700);
</script>
</body>
</html>

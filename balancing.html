<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Balancing Equations — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--green:#8ce99a;--red:#ff8f8f;--panel:rgba(16,28,46,.6)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:radial-gradient(60% 50% at 50% 25%,#1d3346,transparent 60%),#0a1622}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px}
  .stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:96px 16px 220px}
  .eq{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;justify-content:center}
  .sp{display:flex;align-items:center;gap:4px}
  .stk{display:flex;flex-direction:column;align-items:center;gap:2px}
  .stk button{width:30px;height:24px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--ink);font-size:14px;font-weight:700;cursor:pointer;line-height:1}
  .stk button:active{transform:scale(.9)}
  .cf{font-family:'Fraunces',serif;font-weight:700;font-size:26px;min-width:20px;text-align:center;color:var(--amber)}
  .fm{font-family:'Fraunces',serif;font-size:30px}
  .op{font-family:'Fraunces',serif;font-size:24px;color:var(--dim);align-self:center}
  .info{position:fixed;top:84px;right:14px;z-index:9;width:min(220px,50vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .info h4{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  .trow{display:flex;align-items:center;gap:8px;font-size:14px;margin-top:6px}
  .trow .el{font-family:'Fraunces',serif;font-weight:600;flex:0 0 34px}
  .trow .ct{font-family:'Fraunces',serif;font-size:15px}.trow .ok{color:var(--green)}.trow .no{color:var(--red)}
  .status{text-align:center;font-weight:700;font-size:14px;margin-top:12px;padding:8px;border-radius:9px}
  .status.win{background:rgba(140,233,154,.16);color:var(--green)}.status.no{background:rgba(255,255,255,.06);color:var(--dim)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px clamp(14px,5vw,60px) calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:620px;margin:0 auto;text-align:center}
  .hint{font-size:12px;color:var(--dim);margin-bottom:10px}
  .rx{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .rx button{font-family:inherit;font-weight:600;font-size:12.5px;color:var(--ink);background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer}
  .rx button.on{background:var(--teal);color:#04302c;border-color:var(--teal)}
</style>
</head>
<body>
  <a class="back" href="index.html">← Dabble</a>
  <div class="title">⚖️ Balancing Equations</div>
  <div class="stage"><div class="eq" id="eq"></div></div>
  <div class="info">
    <h4>Atom count — left vs right</h4>
    <div id="tally"></div>
    <div class="status no" id="status">Adjust the numbers so both sides match.</div>
  </div>
  <div class="ctrl"><div class="wrap2">
    <div class="hint">Tap ＋ / − to change each <b>coefficient</b> (the big number). Balanced = every element equal on both sides.</div>
    <div class="rx" id="rx"></div>
  </div></div>

<script>
const $=id=>document.getElementById(id);
const RX=[
  {n:'H₂ + O₂ → H₂O', r:[['H₂',{H:2}],['O₂',{O:2}]], p:[['H₂O',{H:2,O:1}]], ans:[2,1,2]},
  {n:'N₂ + H₂ → NH₃', r:[['N₂',{N:2}],['H₂',{H:2}]], p:[['NH₃',{N:1,H:3}]], ans:[1,3,2]},
  {n:'Mg + O₂ → MgO', r:[['Mg',{Mg:1}],['O₂',{O:2}]], p:[['MgO',{Mg:1,O:1}]], ans:[2,1,2]},
  {n:'CH₄ + O₂ → CO₂ + H₂O', r:[['CH₄',{C:1,H:4}],['O₂',{O:2}]], p:[['CO₂',{C:1,O:2}],['H₂O',{H:2,O:1}]], ans:[1,2,1,2]},
  {n:'Fe + O₂ → Fe₂O₃', r:[['Fe',{Fe:1}],['O₂',{O:2}]], p:[['Fe₂O₃',{Fe:2,O:3}]], ans:[4,3,2]}
];
let ri=0, coef=[];
function species(){return RX[ri].r.concat(RX[ri].p);}
function setRx(i){ri=i;coef=species().map(()=>1);buildRx();render();}
window.setRx=setRx;
function buildRx(){$('rx').innerHTML='';RX.forEach(function(rx,i){const b=document.createElement('button');b.textContent=rx.n.split('→')[0].trim()+' →';b.className=i===ri?'on':'';b.onclick=function(){setRx(i);};$('rx').appendChild(b);});}
function step(i,d){coef[i]=Math.max(1,Math.min(15,coef[i]+d));render();}
window.step=step;
function render(){const rx=RX[ri];const all=species();const nR=rx.r.length;
  // equation
  const eq=$('eq');eq.innerHTML='';
  all.forEach(function(sp,i){
    const wrap=document.createElement('div');wrap.className='sp';
    const stk=document.createElement('div');stk.className='stk';
    const up=document.createElement('button');up.textContent='＋';up.onclick=function(){step(i,1);};
    const dn=document.createElement('button');dn.textContent='−';dn.onclick=function(){step(i,-1);};
    stk.appendChild(up);stk.appendChild(dn);
    const cf=document.createElement('span');cf.className='cf';cf.textContent=coef[i];
    const fm=document.createElement('span');fm.className='fm';fm.textContent=sp[0];
    wrap.appendChild(stk);wrap.appendChild(cf);wrap.appendChild(fm);eq.appendChild(wrap);
    const last=(i===nR-1)?'→':(i===all.length-1?'':'+');
    if(last){const o=document.createElement('span');o.className='op';o.textContent=last;eq.appendChild(o);}
  });
  // tally
  const els={};all.forEach(function(sp){for(const e in sp[1])els[e]=true;});
  const tally=$('tally');tally.innerHTML='';let balanced=true;
  Object.keys(els).forEach(function(e){let L=0,R=0;all.forEach(function(sp,i){const c=(sp[1][e]||0)*coef[i];if(i<nR)L+=c;else R+=c;});
    const ok=L===R;if(!ok)balanced=false;
    const row=document.createElement('div');row.className='trow';
    row.innerHTML='<span class="el">'+e+'</span><span class="ct '+(ok?'ok':'no')+'">'+L+' = '+R+(ok?' ✓':' ✗')+'</span>';tally.appendChild(row);});
  const st=$('status');
  if(balanced){st.className='status win';st.innerHTML='✓ Balanced! '+coef.slice(0,nR).join(' : ')+' → '+coef.slice(nR).join(' : ');}
  else{st.className='status no';st.textContent='Not balanced yet — make every element equal.';}
}
setRx(0);
</script>
</body>
</html>

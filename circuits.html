<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Circuits &amp; Ohm's Law — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--panel:rgba(16,28,46,.55)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .hint{position:fixed;top:54px;left:0;right:0;text-align:center;z-index:8;color:var(--dim);font-size:11px;letter-spacing:.16em;text-transform:uppercase;pointer-events:none}
  .info{position:fixed;top:80px;right:14px;z-index:9;width:min(218px,46vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .rr{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:8px}.rr:first-child{margin-top:0}
  .rr .v{font-family:'Fraunces',serif;font-weight:600;font-size:17px}.rr .v.i{color:var(--teal)}
  .note{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:14px clamp(14px,5vw,60px) calc(16px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:720px;margin:0 auto}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;font-family:'Hanken Grotesk';font-weight:600;font-size:13px;color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:9px;cursor:pointer}
  .seg button.on{background:var(--teal);color:#04302c;border-color:var(--teal)}
  .seg button.sw.on{background:var(--amber);border-color:var(--amber);color:#3a2500}
  .stepper{display:flex;align-items:center;gap:8px}
  .stepper button{width:34px;height:30px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--ink);font-size:18px;font-weight:700;cursor:pointer}
  .stepper b{font-family:'Fraunces',serif;font-size:15px;min-width:70px;text-align:center}
  .row{display:flex;align-items:center;gap:14px;margin-top:9px}
  .row .name{flex:0 0 120px;font-weight:600;font-size:14px}
  .row input{flex:1;accent-color:var(--teal);height:28px}
  .row .val{flex:0 0 56px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--teal)}
  .topline{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
  body.preview .back,body.preview .title,body.preview .hint,body.preview .info,body.preview .ctrl{display:none!important}
</style>
</head>
<body>
  <div id="loader">building the circuit…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="https://maghimma.github.io/dabble/">← Dabble</a>
  <div class="title">⚡ Circuits &amp; Ohm's Law</div>
  <div class="hint">drag to look around ↻</div>
  <div class="info">
    <div class="rr"><span>Wiring</span><span class="v" id="o-mode">Series</span></div>
    <div class="rr"><span>Bulbs</span><span class="v" id="o-n">1</span></div>
    <div class="rr"><span>Voltage</span><span class="v" id="o-v">6 V</span></div>
    <div class="rr"><span>Each bulb R</span><span class="v" id="o-r">3 Ω</span></div>
    <div class="rr"><span>Total R</span><span class="v" id="o-rt">3 Ω</span></div>
    <div class="rr"><span>Total current</span><span class="v i" id="o-i">2.0 A</span></div>
    <div class="note" id="o-tip">Series: bulbs share one current — add more and all dim.</div>
  </div>
  <div class="ctrl"><div class="wrap2">
    <div class="topline">
      <div class="seg" style="flex:1">
        <button id="b-series" class="on" onclick="setMode('series')">Series</button>
        <button id="b-parallel" onclick="setMode('parallel')">Parallel</button>
      </div>
      <div class="seg"><button id="b-switch" class="sw on" onclick="toggleSwitch()">Switch: ON</button></div>
      <div class="stepper"><button onclick="addBulb(-1)">−</button><b id="b-count">1 bulb</b><button onclick="addBulb(1)">+</button></div>
    </div>
    <div class="row"><span class="name">Voltage</span><input type="range" id="v" min="0" max="12" step="0.5" value="6" oninput="upd()"><span class="val" id="v-v">6 V</span></div>
    <div class="row"><span class="name">Each bulb R</span><input type="range" id="r" min="1" max="12" step="1" value="3" oninput="upd()"><span class="val" id="r-v">3 Ω</span></div>
  </div></div>

<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }</script>
<script type="module">
const __err=m=>{const l=document.getElementById('loader');if(l){l.style.opacity=1;l.textContent=String(m).slice(0,140);l.style.color='#ff9a8a';}};
window.addEventListener('error',e=>__err('ERR: '+(e.message||e.error)));
import * as THREE from 'three';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const PREVIEW=new URLSearchParams(location.search).has('preview');
if(PREVIEW)document.body.classList.add('preview');
const canvas=$('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x16283e,90,180);
const camera=new THREE.PerspectiveCamera(52,1,0.1,400);
(()=>{const c=document.createElement('canvas');c.width=8;c.height=256;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#1d3a5c');gr.addColorStop(.6,'#13263c');gr.addColorStop(1,'#0c1b2c');g.fillStyle=gr;g.fillRect(0,0,8,256);scene.background=new THREE.CanvasTexture(c);})();
scene.add(new THREE.HemisphereLight(0xcfe6ff,0x223044,0.9));
const key=new THREE.DirectionalLight(0xffffff,1.25);key.position.set(22,36,18);key.castShadow=true;key.shadow.mapSize.set(1024,1024);key.shadow.camera.near=1;key.shadow.camera.far=130;key.shadow.camera.left=-48;key.shadow.camera.right=48;key.shadow.camera.top=48;key.shadow.camera.bottom=-48;scene.add(key);
scene.add(new THREE.AmbientLight(0xffffff,.3));
function mat(c,o={}){return new THREE.MeshStandardMaterial({color:c,roughness:o.r??.6,metalness:o.m??.2,...(o.e?{emissive:o.e,emissiveIntensity:o.ei??.4}:{})});}
const board=new THREE.Mesh(new THREE.BoxGeometry(66,2,48),mat(0x21405a,{r:.95,m:0}));board.position.y=-1;board.receiveShadow=true;scene.add(board);
const grid=new THREE.GridHelper(66,16,0x3a5a82,0x2a4364);grid.position.y=0.06;scene.add(grid);
const glowTex=(()=>{const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');const rg=g.createRadialGradient(64,64,0,64,64,64);rg.addColorStop(0,'rgba(255,225,150,.95)');rg.addColorStop(.4,'rgba(255,210,90,.4)');rg.addColorStop(1,'rgba(255,210,90,0)');g.fillStyle=rg;g.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);})();
function labelSprite(text){const c=document.createElement('canvas');c.width=256;c.height=64;const g=c.getContext('2d');g.fillStyle='#cfe0ee';g.font='600 30px Hanken Grotesk,sans-serif';g.textAlign='center';g.textBaseline='middle';g.fillText(text,128,34);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false}));s.scale.set(12,3,1);return s;}
const pmat=new THREE.MeshStandardMaterial({color:0xaffff5,emissive:0x4fe9da,emissiveIntensity:1.2});
const pgeo=new THREE.SphereGeometry(0.92,10,10);
const comp=new THREE.Group();scene.add(comp);
let bulbs=[], edges=[], switchLever=null;
function disposeGroup(g){g.traverse(o=>{if(o.geometry)o.geometry.dispose?.();if(o.material&&o.material!==pmat)o.material.dispose?.();});while(g.children.length)g.remove(g.children[0]);}
function tube(curve,r){return new THREE.Mesh(new THREE.TubeGeometry(curve,Math.max(8,Math.round(curve.getLength())),r,8,false),mat(0x9fb6cf,{m:.5,r:.4}));}
function addEdge(curve){const m=tube(curve,0.55);m.castShadow=true;comp.add(m);const len=curve.getLength();const cnt=clamp(Math.round(len/2.6),3,26);const parts=[];for(let i=0;i<cnt;i++){const p=new THREE.Mesh(pgeo,pmat);p.userData.u=i/cnt;comp.add(p);parts.push(p);}edges.push({curve,len,parts,I:0});}
function makeBulb(x,y,z){const g=new THREE.Group();const base=new THREE.Mesh(new THREE.CylinderGeometry(.9,.9,1.6,12),mat(0xbbbbbb,{m:.6}));base.position.y=-1.7;g.add(base);const sph=new THREE.Mesh(new THREE.SphereGeometry(2.1,18,14),new THREE.MeshStandardMaterial({color:0xffe9a8,emissive:0xffd23f,emissiveIntensity:0,roughness:.2,transparent:true,opacity:.92}));sph.castShadow=true;g.add(sph);const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));spr.scale.set(16,16,1);g.add(spr);const light=new THREE.PointLight(0xffd98a,0,46,2);g.add(light);g.position.set(x,y,z);comp.add(g);bulbs.push({sph,spr,light});}
function makeSwitch(x,y,z,horiz){const g=new THREE.Group();[-2.2,2.2].forEach(dx=>{const post=new THREE.Mesh(new THREE.CylinderGeometry(.4,.4,2,8),mat(0xcfd8e3,{m:.6}));post.position.set(horiz?dx:0,0,horiz?0:dx);g.add(post);});const lever=new THREE.Mesh(new THREE.BoxGeometry(4.6,.5,.7),mat(0xf6a623,{e:0x6a4400,ei:.3}));lever.position.set(horiz?-0.2:0,.6,horiz?0:-0.2);g.add(lever);g.position.set(x,y,z);comp.add(g);switchLever=lever;}
const V3=(x,y,z)=>new THREE.Vector3(x,y,z);
function spread(n,a,b){if(n===1)return [(a+b)/2];const out=[];for(let i=0;i<n;i++)out.push(a+(b-a)*i/(n-1));return out;}
const state={mode:'series',n:1,closed:true};
function rebuild(){disposeGroup(comp);bulbs=[];edges=[];switchLever=null;
  const y=1.6, n=state.n;
  const batt=new THREE.Group();batt.add(new THREE.Mesh(new THREE.BoxGeometry(9,4,4),mat(0x2e4a66)));const cap=new THREE.Mesh(new THREE.CylinderGeometry(.7,.7,1,12),mat(0xffd23f,{e:0x5a4400,ei:.3}));cap.rotation.z=Math.PI/2;cap.position.x=5;batt.add(cap);batt.traverse(o=>o.castShadow=true);
  if(state.mode==='series'){
    batt.position.set(0,1.9,16);comp.add(batt);const bl=labelSprite('battery');bl.position.set(0,5.6,16);comp.add(bl);
    addEdge(new THREE.CatmullRomCurve3([V3(-23,y,-14),V3(23,y,-14),V3(23,y,16),V3(-23,y,16)],true,'catmullrom',0));
    spread(n,-16,16).forEach(x=>makeBulb(x,y+2.4,-14));
    makeSwitch(23,y,1,false);const sl=labelSprite('switch');sl.position.set(27,4.6,1);comp.add(sl);
  }else{
    batt.position.set(-28,1.9,0);batt.rotation.y=Math.PI/2;comp.add(batt);const bl=labelSprite('battery');bl.position.set(-28,5.6,0);comp.add(bl);
    addEdge(new THREE.LineCurve3(V3(-20,y,-15),V3(20,y,-15)));
    addEdge(new THREE.LineCurve3(V3(-20,y,15),V3(20,y,15)));
    addEdge(new THREE.LineCurve3(V3(-28,y,-3),V3(-20,y,-15)));
    addEdge(new THREE.LineCurve3(V3(-28,y,3),V3(-20,y,15)));
    makeSwitch(-24,y,-9,true);const sl=labelSprite('switch');sl.position.set(-24,4.6,-9);comp.add(sl);
    spread(n,-13,17).forEach(x=>{addEdge(new THREE.LineCurve3(V3(x,y,-15),V3(x,y,15)));makeBulb(x,y+2.6,0);});
  }
  upd();
}
function setMode(m){state.mode=m;$('b-series').classList.toggle('on',m==='series');$('b-parallel').classList.toggle('on',m==='parallel');rebuild();}
function addBulb(d){state.n=clamp(state.n+d,1,3);$('b-count').textContent=state.n+(state.n>1?' bulbs':' bulb');rebuild();}
function toggleSwitch(){state.closed=!state.closed;const b=$('b-switch');b.classList.toggle('on',state.closed);b.textContent='Switch: '+(state.closed?'ON':'OFF');if(switchLever)switchLever.rotation.z=state.closed?0:0.7;upd();}
window.setMode=setMode;window.addBulb=addBulb;window.toggleSwitch=toggleSwitch;
function upd(){const V=+$('v').value,R=+$('r').value,n=state.n;
  let Rt,Itot,Pbulb;
  if(!state.closed){Rt=(state.mode==='series'?n*R:R/n);Itot=0;Pbulb=0;}
  else if(state.mode==='series'){Rt=n*R;Itot=V/Rt;Pbulb=Itot*Itot*R;}
  else{Rt=R/n;Itot=n*(V/R);Pbulb=V*V/R;}
  $('v-v').textContent=V+' V';$('r-v').textContent=R+' Ω';
  $('o-mode').textContent=state.mode==='series'?'Series':'Parallel';$('o-n').textContent=n;$('o-v').textContent=V+' V';$('o-r').textContent=R+' Ω';$('o-rt').textContent=Rt.toFixed(1)+' Ω';$('o-i').textContent=Itot.toFixed(2)+' A';
  $('o-tip').innerHTML=state.mode==='series'?'Series: one shared current — add bulbs and <b>all dim</b> (R adds up).':'Parallel: each bulb gets the full voltage — add bulbs and <b>each stays bright</b> (total current rises).';
  const b=clamp(Pbulb/48,0,1);
  bulbs.forEach(bb=>{bb.sph.material.emissiveIntensity=b*2.4;bb.light.intensity=b*2.4;bb.spr.material.opacity=b;});
  pmat.emissiveIntensity=1+clamp(Itot,0,6)*0.25;
  if(state.mode==='series'){edges.forEach(e=>e.I=Itot);}
  else{const Ib=state.closed?V/R:0;edges.forEach((e,i)=>{e.I=i<4?Itot:Ib;});}
}
window.upd=upd;
const orbit={th:0.7,ph:1.02,R:74,tgt:new THREE.Vector3(0,2,0),drag:false,px:0,py:0};
function applyCam(){const{th,ph,R,tgt}=orbit;camera.position.set(tgt.x+R*Math.sin(ph)*Math.sin(th),tgt.y+R*Math.cos(ph),tgt.z+R*Math.sin(ph)*Math.cos(th));camera.lookAt(tgt);}
canvas.addEventListener('pointerdown',e=>{orbit.drag=true;orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointermove',e=>{if(!orbit.drag)return;orbit.th-=(e.clientX-orbit.px)*.006;orbit.ph=clamp(orbit.ph-(e.clientY-orbit.py)*.005,.5,1.4);orbit.px=e.clientX;orbit.py=e.clientY;});
addEventListener('pointerup',()=>orbit.drag=false);
function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
new ResizeObserver(resize).observe(canvas);
const clock=new THREE.Clock(),tmp=new THREE.Vector3();
function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.05);if(!orbit.drag)orbit.th+=dt*.05;applyCam();
  for(const e of edges){if(e.I<=0)continue;const adv=dt*e.I*6/e.len;for(const p of e.parts){p.userData.u=(p.userData.u+adv)%1;e.curve.getPointAt(p.userData.u,tmp);p.position.copy(tmp);}}
  renderer.render(scene,camera);}
if(PREVIEW){state.mode='parallel';state.n=3;$('v').value=9;orbit.R=82;}
rebuild();resize();applyCam();tick();
setTimeout(()=>$('loader').classList.add('hide'),700);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dabble — logo options</title>
<style>
  :root{--ink:#1d1d1f;--dim:#6e6e73}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#fcfcfe,#f1f2f6);min-height:100vh;padding:50px 22px 70px}
  h1{text-align:center;font-size:30px;font-weight:700;letter-spacing:-.02em}
  .note{text-align:center;color:var(--dim);font-size:15px;margin-top:8px}
  .grid{max-width:1000px;margin:40px auto 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .card{background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.06);border-radius:22px;padding:26px;backdrop-filter:blur(14px);
    box-shadow:0 10px 34px rgba(30,40,80,.08);text-align:center}
  .num{font-size:13px;font-weight:700;color:#0071e3;letter-spacing:.08em}
  .ico{width:96px;height:96px;margin:14px auto 0}
  .ico svg{width:100%;height:100%;display:block;filter:drop-shadow(0 8px 18px rgba(30,40,80,.18))}
  .name{font-weight:700;font-size:16px;margin-top:16px;letter-spacing:-.01em}
  .desc{color:var(--dim);font-size:13px;margin-top:3px}
  .navprev{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,0,0,.06)}
  .navprev svg{width:26px;height:26px}
  .navprev b{font-weight:700;font-size:17px;letter-spacing:-.01em}
</style>
</head>
<body>
  <h1>Dabble — logo options</h1>
  <div class="note">Tell me the number you like (icon + how it looks next to the name). Nothing's locked.</div>
  <div class="grid" id="grid"></div>

<script>
  const G='<defs><linearGradient id="LG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a8bff"/><stop offset="1" stop-color="#19c7b6"/></linearGradient></defs>';
  function sq(inner,bg){return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${G}<rect x="3" y="3" width="94" height="94" rx="27" fill="${bg||'url(#LG)'}"/>${inner}</svg>`;}

  const opts=[
    {n:'01',name:'Tile grid — colour',desc:'Hub of subjects, playful',
     svg:sq(`<rect x="24" y="24" width="22" height="22" rx="7" fill="#fff" opacity=".95"/><rect x="54" y="24" width="22" height="22" rx="7" fill="#fff" opacity=".72"/><rect x="24" y="54" width="22" height="22" rx="7" fill="#fff" opacity=".72"/><rect x="54" y="54" width="22" height="22" rx="7" fill="#fff" opacity=".95"/>`)},

    {n:'02',name:'Tile grid — light',desc:'Clean, each tile a subject',
     svg:sq(`<rect x="24" y="24" width="22" height="22" rx="7" fill="#3a8bff"/><rect x="54" y="24" width="22" height="22" rx="7" fill="#19c7b6"/><rect x="24" y="54" width="22" height="22" rx="7" fill="#9b5de5"/><rect x="54" y="54" width="22" height="22" rx="7" fill="#ffb454"/>`,'#fff')},

    {n:'03',name:'Cursor',desc:'You interact — learn by doing',
     svg:sq(`<polygon points="38,28 38,72 49,61 56,77 63,74 56,59 70,57" fill="#fff"/>`)},

    {n:'04',name:'Cursor + ripple',desc:'Poke it, it responds',
     svg:sq(`<ellipse cx="60" cy="68" rx="18" ry="6.5" fill="none" stroke="#fff" stroke-width="3" opacity=".5"/><polygon points="34,26 34,64 44,55 50,69 56,66 50,52 62,50" fill="#fff"/>`)},

    {n:'05',name:'Tap + ripple',desc:'A "dab" that ripples out',
     svg:sq(`<circle cx="50" cy="38" r="9" fill="#fff"/><ellipse cx="50" cy="64" rx="13" ry="5" fill="none" stroke="#fff" stroke-width="3.6" opacity=".95"/><ellipse cx="50" cy="69" rx="25" ry="8.5" fill="none" stroke="#fff" stroke-width="3.2" opacity=".5"/>`)},

    {n:'06',name:'Ripple rings',desc:'Minimal, calm',
     svg:sq(`<circle cx="50" cy="50" r="7" fill="#fff"/><circle cx="50" cy="50" r="17" fill="none" stroke="#fff" stroke-width="3.4" opacity=".8"/><circle cx="50" cy="50" r="28" fill="none" stroke="#fff" stroke-width="3" opacity=".45"/>`)},

    {n:'07',name:'"d" monogram',desc:'Apple-app, safe',
     svg:sq(`<text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,Helvetica,sans-serif" font-weight="700" font-size="62" fill="#fff">d</text>`)},
  ];

  document.getElementById('grid').innerHTML = opts.map(o=>`
    <div class="card">
      <div class="num">${o.n}</div>
      <div class="ico">${o.svg}</div>
      <div class="name">${o.name}</div>
      <div class="desc">${o.desc}</div>
      <div class="navprev">${o.svg}<b>Dabble</b></div>
    </div>`).join('');
</script>
</body>
</html>

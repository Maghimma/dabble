<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dabble — icon mark options</title>
<style>
  :root{--ink:#1d1d1f;--dim:#6e6e73}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#fcfcfe,#eef0f5);min-height:100vh;padding:46px 22px 80px}
  h1{text-align:center;font-size:28px;font-weight:700;letter-spacing:-.02em}
  .note{text-align:center;color:var(--dim);font-size:14.5px;margin-top:8px;max-width:60ch;margin-left:auto;margin-right:auto}
  /* primary logo banner */
  .primary{max-width:520px;margin:28px auto 0;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:20px;padding:22px;text-align:center;box-shadow:0 10px 30px rgba(30,40,80,.07)}
  .primary .lbl{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
  .wm{display:inline-flex;align-items:flex-end;gap:1px;font-weight:800;font-size:34px;letter-spacing:-.03em;color:var(--ink);position:relative;padding-bottom:8px;margin-top:10px}
  .wm .drop{width:13px;height:17px;background:linear-gradient(135deg,#3a8bff,#19c7b6);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;margin:0 1px 5px 1px}
  .wm .wave{position:absolute;left:0;bottom:-2px;width:100%;height:10px}

  .gridhead{text-align:center;margin:42px 0 4px;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#0071e3}
  .grid{max-width:1040px;margin:18px auto 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
  .card{background:rgba(255,255,255,.75);border:1px solid rgba(0,0,0,.06);border-radius:22px;padding:24px;text-align:center;box-shadow:0 10px 30px rgba(30,40,80,.08)}
  .num{font-size:13px;font-weight:700;color:#0071e3;letter-spacing:.08em}
  .big{width:84px;height:84px;margin:12px auto 0}.big svg{width:100%;height:100%;filter:drop-shadow(0 8px 16px rgba(30,40,80,.16))}
  .name{font-weight:700;font-size:15px;margin-top:14px}
  .tiny{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,0,0,.06)}
  .tiny .t32{width:32px;height:32px}.tiny .t16{width:16px;height:16px}.tiny svg{width:100%;height:100%}
  .tiny span{font-size:11px;color:var(--dim)}
</style>
</head>
<body>
  <h1>The two forms of the brand</h1>
  <div class="note">The <b>wordmark</b> is the main logo (where there's room). The <b>icon mark</b> below is the compact version for the favicon, app icon &amp; avatar. Pick an icon — shown big and at real favicon sizes (32px / 16px).</div>

  <div class="primary">
    <div class="lbl">Primary logo · locked</div>
    <span class="wm">dabble<span class="drop"></span><svg class="wave" viewBox="0 0 120 10" preserveAspectRatio="none"><defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3a8bff"/><stop offset="1" stop-color="#19c7b6"/></linearGradient></defs><path d="M2,6 Q20,1 40,6 T78,6 T118,5" fill="none" stroke="url(#wg)" stroke-width="3" stroke-linecap="round"/></svg></span>
  </div>

  <div class="gridhead">Pick the icon mark ↓</div>
  <div class="grid" id="grid"></div>

<script>
  const defs=`<defs>
    <linearGradient id="bt" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a8bff"/><stop offset="1" stop-color="#19c7b6"/></linearGradient>
    <linearGradient id="multi" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a8bff"/><stop offset=".5" stop-color="#9b5de5"/><stop offset="1" stop-color="#ff5e9a"/></linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff8a3a"/><stop offset="1" stop-color="#ff3b6e"/></linearGradient>
  </defs>`;
  const sq=(inner,bg)=>`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${defs}<rect x="3" y="3" width="94" height="94" rx="27" fill="${bg}"/>${inner}</svg>`;
  const curPath='M34 26 L34 64 L44 55 L50 69 L56 66 L50 52 L62 50 Z';

  const opts=[
    {n:'01',name:'Droplet · multicolour',svg:sq(`<path d="M50 26 C50 26 70 52 70 64 A20 20 0 1 1 30 64 C30 52 50 26 50 26 Z" fill="#fff"/>`,'url(#multi)')},
    {n:'02',name:'Cursor · outline (white)',svg:sq(`<path d="${curPath}" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>`,'url(#bt)')},
    {n:'03',name:'Cursor · gradient outline',svg:sq(`<path d="${curPath}" fill="none" stroke="url(#multi)" stroke-width="5.5" stroke-linejoin="round"/>`,'#fff')},
    {n:'04',name:'Cursor + colour ripple',svg:sq(`<ellipse cx="60" cy="70" rx="17" ry="6" fill="none" stroke="#ffd23f" stroke-width="3.4"/><path d="${curPath}" fill="#fff"/>`,'url(#bt)')},
    {n:'05',name:'Cursor · bold colour',svg:sq(`<path d="${curPath}" fill="#fff"/>`,'url(#sun)')},
    {n:'06',name:'Droplet · sunset',svg:sq(`<path d="M50 26 C50 26 70 52 70 64 A20 20 0 1 1 30 64 C30 52 50 26 50 26 Z" fill="#fff"/>`,'url(#sun)')},
  ];

  document.getElementById('grid').innerHTML = opts.map(o=>`
    <div class="card">
      <div class="num">${o.n}</div>
      <div class="big">${o.svg}</div>
      <div class="name">${o.name}</div>
      <div class="tiny"><div class="t32">${o.svg}</div><div class="t16">${o.svg}</div><span>favicon size</span></div>
    </div>`).join('');
</script>
</body>
</html>

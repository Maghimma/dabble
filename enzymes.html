<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Enzymes (Lock &amp; Key) — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--green:#8ce99a;--red:#ff6b6b;--panel:rgba(16,28,46,.62)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:radial-gradient(60% 55% at 45% 38%,#1a3b46,transparent 62%),linear-gradient(170deg,#10303a,#0a1822)}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .info{position:fixed;top:62px;right:14px;z-index:9;width:min(222px,48vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .rr{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:8px}.rr:first-child{margin-top:0}.rr .v{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
  .v.ok{color:var(--green)}.v.bad{color:var(--red)}
  .leg{font-size:11px;color:var(--dim);margin-top:9px;line-height:1.8}.leg i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .note{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:9px;border-top:1px dashed var(--line);padding-top:8px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px clamp(14px,5vw,60px) calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:620px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .wrap2 .name{flex:0 0 110px;font-weight:600;font-size:14px}
  .wrap2 input{flex:1;height:30px;-webkit-appearance:none;appearance:none;border-radius:6px;background:linear-gradient(90deg,#5b9bff,#2ec4b6 45%,#f6a623 72%,#ff6b6b)}
  .wrap2 input::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.5);cursor:pointer}
  .wrap2 .val{flex:0 0 96px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--teal)}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
  <div id="loader">folding enzymes…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="https://maghimma.github.io/dabble/">← Dabble</a>
  <div class="title">🧬 Enzymes — Lock &amp; Key</div>
  <div class="info">
    <div class="rr"><span>Temperature</span><span class="v" id="o-temp">optimum</span></div>
    <div class="rr"><span>Status</span><span class="v ok" id="o-stat">working</span></div>
    <div class="rr"><span>Reaction rate</span><span class="v" id="o-rate">0 /s</span></div>
    <div class="rr"><span>Reactions</span><span class="v" id="o-count">0</span></div>
    <div class="leg"><i style="background:#2ec4b6"></i>enzyme &nbsp;<i style="background:#f6a623"></i>substrate &nbsp;<i style="background:#8ce99a"></i>products</div>
    <div class="note" id="o-note">A substrate fits the enzyme's <b>active site</b> like a key in a lock → reacts → leaves as products. The enzyme is reused.</div>
  </div>
  <div class="ctrl"><div class="wrap2"><span class="name">Temperature</span><input type="range" id="temp" min="1" max="10" step="1" value="5" oninput="upd()"><span class="val" id="temp-v">optimum</span></div></div>

<script>
const $=id=>document.getElementById(id);const cv=$('gl'),ctx=cv.getContext('2d');
let W,H;function resize(){const d=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=W*d;cv.height=H*d;ctx.setTransform(d,0,0,d,0,0);}
new ResizeObserver(resize).observe(cv);resize();
const rnd=(a,b)=>a+Math.random()*(b-a);
const ER=54,PR=21;
let enz=[],sub=[],prod=[],count=0,events=[],denat=false;
function pocket(e){return {x:e.x+Math.cos(e.ang)*ER,y:e.y+Math.sin(e.ang)*ER};}
function spawnSub(){sub.push({x:rnd(PR,W-PR),y:rnd(150,H-180),vx:rnd(-1,1),vy:rnd(-1,1)});}
function init(){enz=[];sub=[];prod=[];count=0;events=[];
  enz.push({x:W*0.37,y:H*0.5,ang:0.25,busy:0,sub:null,seed:1.7});
  enz.push({x:W*0.65,y:H*0.46,ang:Math.PI-0.25,busy:0,sub:null,seed:4.1});
  for(let i=0;i<5;i++)spawnSub();}
function upd(){const t=+$('temp').value;const word=t<=2?'cold':t<=4?'cool':t<=6?'optimum':t<=7?'warm':'too hot';
  $('temp-v').textContent=word;$('o-temp').textContent=word;denat=t>=8;
  $('o-stat').textContent=denat?'DENATURED':'working';$('o-stat').className='v '+(denat?'bad':'ok');
  $('o-note').innerHTML=denat?'<b>Too hot!</b> The enzyme <b>denatured</b> — the active site changed shape, so substrates no longer fit and the reaction stops (permanent).':'A substrate fits the <b>active site</b> like a key in a lock → reacts → leaves as products. Up to the optimum, hotter = faster.';}
// organic blob path
function blob(x,y,r,seed,t){ctx.beginPath();for(let a=0;a<=Math.PI*2+0.01;a+=Math.PI/18){const rr=r*(1+0.05*Math.sin(a*3+seed)+0.03*Math.sin(a*5-seed+t));const px=x+Math.cos(a)*rr,py=y+Math.sin(a)*rr;a===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.closePath();}
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;ctx.clearRect(0,0,W,H);const tsec=now/1000;
  const t=+$('temp').value,sp=14+t*12;
  for(const s of sub){
    if(!denat){let best=null,bd=1e9;for(const e of enz){if(e.busy>0)continue;const p=pocket(e);const d=Math.hypot(s.x-p.x,s.y-p.y);if(d<bd){bd=d;best=p;}}if(best&&bd<210){s.vx+=(best.x-s.x)/bd*0.4;s.vy+=(best.y-s.y)/bd*0.4;}}
    const n=Math.hypot(s.vx,s.vy)||1;s.vx/=n;s.vy/=n;s.x+=s.vx*sp*dt;s.y+=s.vy*sp*dt;
    if(s.x<PR){s.x=PR;s.vx=Math.abs(s.vx);}if(s.x>W-PR){s.x=W-PR;s.vx=-Math.abs(s.vx);}
    if(s.y<130){s.y=130;s.vy=Math.abs(s.vy);}if(s.y>H-150){s.y=H-150;s.vy=-Math.abs(s.vy);}
    for(const e of enz){const d=Math.hypot(s.x-e.x,s.y-e.y)||1;if(d<ER+PR-5){const p=pocket(e);const dp=Math.hypot(s.x-p.x,s.y-p.y);
      if(!denat&&e.busy<=0&&dp<PR*1.25){s.dead=true;e.busy=1.4;e.sub=true;}else{const nx=(s.x-e.x)/d,ny=(s.y-e.y)/d;s.x=e.x+nx*(ER+PR-4);s.y=e.y+ny*(ER+PR-4);const dd=s.vx*nx+s.vy*ny;s.vx-=2*dd*nx;s.vy-=2*dd*ny;}}}
  }
  sub=sub.filter(s=>!s.dead);
  for(const e of enz){e.x+=Math.sin(now/2200+e.y)*5*dt;
    if(e.busy>0){e.busy-=dt;if(e.busy<=0){const p=pocket(e);for(let k=0;k<2;k++)prod.push({x:p.x,y:p.y,vx:Math.cos(e.ang+(k?0.7:-0.7))*52,vy:Math.sin(e.ang+(k?0.7:-0.7))*52,life:4});count++;events.push(now);e.sub=false;spawnSub();}}}
  for(let i=prod.length-1;i>=0;i--){const p=prod[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985;p.life-=dt;if(p.life<=0)prod.splice(i,1);}
  // ---- draw enzymes ----
  for(const e of enz){ctx.save();
    if(denat){const g=ctx.createRadialGradient(e.x-15,e.y-15,8,e.x,e.y,ER);g.addColorStop(0,'#ff8a8a');g.addColorStop(1,'#c43a3a');ctx.fillStyle=g;blob(e.x,e.y,ER,e.seed,tsec*4);ctx.fill();}
    else{const g=ctx.createRadialGradient(e.x-18,e.y-18,10,e.x,e.y,ER);g.addColorStop(0,e.busy>0?'#6fe9dc':'#46d6c6');g.addColorStop(1,'#1c8e82');ctx.fillStyle=g;blob(e.x,e.y,ER,e.seed,tsec*0.6);ctx.fill();
      const p=pocket(e);ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(p.x,p.y,PR+2,0,7);ctx.fill();ctx.globalCompositeOperation='source-over';
      ctx.strokeStyle='rgba(180,255,245,.7)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(p.x,p.y,PR+3,0,7);ctx.stroke();}
    ctx.restore();}
  // docked substrate fills the active site
  for(const e of enz){if(e.busy>0&&e.sub){const p=pocket(e);const g=ctx.createRadialGradient(p.x-6,p.y-6,3,p.x,p.y,PR);g.addColorStop(0,'#ffd27a');g.addColorStop(1,'#e08a14');ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,PR,0,7);ctx.fill();}}
  // free substrates
  for(const s of sub){const g=ctx.createRadialGradient(s.x-6,s.y-6,3,s.x,s.y,PR);g.addColorStop(0,'#ffd27a');g.addColorStop(1,'#e08a14');ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,PR,0,7);ctx.fill();}
  // products (glow)
  for(const p of prod){ctx.globalAlpha=Math.max(0,Math.min(1,p.life/1.3));ctx.shadowColor='#8ce99a';ctx.shadowBlur=14;ctx.fillStyle='#8ce99a';ctx.beginPath();ctx.arc(p.x,p.y,11,0,7);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;}
  // active-site label
  if(!denat&&enz[0]){const p=pocket(enz[0]);ctx.fillStyle='#cfe0ee';ctx.font='600 13px Hanken Grotesk';ctx.textAlign='center';ctx.fillText('active site',p.x,p.y-PR-12);}
  events=events.filter(e=>now-e<3000);$('o-rate').textContent=(events.length/3).toFixed(1)+' /s';$('o-count').textContent=count;
  requestAnimationFrame(loop);}
init();upd();requestAnimationFrame(loop);
setTimeout(()=>$('loader').classList.add('hide'),300);
addEventListener('resize',resize);
</script>
</body>
</html>

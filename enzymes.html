<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Enzymes (Lock &amp; Key) — Dabble</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#eaf1f7;--dim:rgba(234,241,247,.62);--line:rgba(234,241,247,.16);--teal:#2ec4b6;--amber:#f6a623;--green:#8ce99a;--red:#ff6b6b;--panel:rgba(16,28,46,.6)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}
  body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);overflow:hidden;background:#0a1622}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block}
  .back{position:fixed;top:16px;left:18px;z-index:10;color:var(--dim);text-decoration:none;font-size:14px;font-weight:600}.back:hover{color:var(--ink)}
  .title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:9;font-family:'Fraunces',serif;font-weight:600;font-size:21px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .info{position:fixed;top:62px;right:14px;z-index:9;width:min(220px,48vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(14px)}
  .rr{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:8px}.rr:first-child{margin-top:0}.rr .v{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
  .v.ok{color:var(--green)}.v.bad{color:var(--red)}
  .leg{font-size:11px;color:var(--dim);margin-top:9px;line-height:1.7}.leg i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .note{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:9px;border-top:1px dashed var(--line);padding-top:8px}.note b{color:var(--amber)}
  .ctrl{position:fixed;bottom:0;left:0;right:0;z-index:9;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:16px clamp(14px,5vw,60px) calc(18px + env(safe-area-inset-bottom));backdrop-filter:blur(14px)}
  .wrap2{max-width:620px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .wrap2 .name{flex:0 0 110px;font-weight:600;font-size:14px}
  .wrap2 input{flex:1;height:30px}
  .wrap2 input{accent-color:var(--teal)}
  .wrap2 .val{flex:0 0 96px;text-align:right;font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--teal)}
  #loader{position:fixed;inset:0;z-index:30;background:#0a1622;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;letter-spacing:.3em;text-transform:uppercase;transition:opacity .7s}
  #loader.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
  <div id="loader">folding enzymes…</div>
  <canvas id="gl"></canvas>
  <a class="back" href="https://maghimma.github.io/dabble/">← Dabble</a>
  <div class="title">🧬 Enzymes — Lock &amp; Key</div>
  <div class="info">
    <div class="rr"><span>Temperature</span><span class="v" id="o-temp">optimum</span></div>
    <div class="rr"><span>Status</span><span class="v ok" id="o-stat">working</span></div>
    <div class="rr"><span>Reaction rate</span><span class="v" id="o-rate">0 /s</span></div>
    <div class="leg"><i style="background:#2ec4b6"></i>enzyme (active site)<br><i style="background:#f6a623"></i>substrate &nbsp; <i style="background:#8ce99a"></i>products</div>
    <div class="note" id="o-note">A substrate fits the enzyme's <b>active site</b> like a key in a lock, reacts, and leaves as products. The enzyme is reused.</div>
  </div>
  <div class="ctrl"><div class="wrap2"><span class="name">Temperature</span><input type="range" id="temp" min="1" max="10" step="1" value="5" oninput="upd()"><span class="val" id="temp-v">optimum</span></div></div>

<script>
const $=id=>document.getElementById(id);const cv=$('gl'),ctx=cv.getContext('2d');
let W,H,dpr;function resize(){dpr=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
new ResizeObserver(resize).observe(cv);resize();
const rnd=(a,b)=>a+Math.random()*(b-a);
const ER=46,SR=15;
let enz=[],sub=[],prod=[],count=0,events=[],denat=false;
function spawnSub(){sub.push({x:rnd(SR,W-SR),y:rnd(120,H-150),vx:rnd(-1,1),vy:rnd(-1,1)});}
function init(){enz=[];sub=[];prod=[];
  enz.push({x:W*0.36,y:H*0.5,ang:0,busy:0});enz.push({x:W*0.64,y:H*0.46,ang:Math.PI,busy:0});
  for(let i=0;i<6;i++)spawnSub();}
function upd(){const t=+$('temp').value;const word=t<=2?'cold':t<=4?'cool':t<=6?'optimum':t<=7?'warm':'too hot';
  $('temp-v').textContent=word;$('o-temp').textContent=word;denat=t>=8;
  $('o-stat').textContent=denat?'DENATURED':'working';$('o-stat').className='v '+(denat?'bad':'ok');
  $('o-note').innerHTML=denat?'<b>Too hot!</b> The enzyme has <b>denatured</b> — its active site changed shape, so the substrate no longer fits and the reaction stops. This is permanent.':'A substrate fits the <b>active site</b> like a key in a lock, reacts, then leaves as products. Higher temperature (up to the optimum) = faster.';}
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;ctx.clearRect(0,0,W,H);
  const t=+$('temp').value;const sp=20+t*16;
  // substrates move
  for(const s of sub){s.x+=s.vx*sp*dt;s.y+=s.vy*sp*dt;
    if(s.x<SR){s.x=SR;s.vx=Math.abs(s.vx);}if(s.x>W-SR){s.x=W-SR;s.vx=-Math.abs(s.vx);}
    if(s.y<100){s.y=100;s.vy=Math.abs(s.vy);}if(s.y>H-130){s.y=H-130;s.vy=-Math.abs(s.vy);}
    const n=Math.hypot(s.vx,s.vy)||1;s.vx/=n;s.vy/=n;}
  // enzymes drift + rotate mouth
  for(const e of enz){if(!denat){e.ang+=dt*0.5;}e.x+=Math.sin(now/1700+e.y)*6*dt;
    if(e.busy>0){e.busy-=dt;if(e.busy<=0){const mx=e.x+Math.cos(e.ang)*ER,my=e.y+Math.sin(e.ang)*ER;for(let k=0;k<2;k++)prod.push({x:mx,y:my,vx:Math.cos(e.ang+(k?0.6:-0.6))*70,vy:Math.sin(e.ang+(k?0.6:-0.6))*70,life:1.4});count++;events.push(now);spawnSub();}}
  }
  // binding
  if(!denat)for(const e of enz){if(e.busy>0)continue;const mx=e.x+Math.cos(e.ang)*ER,my=e.y+Math.sin(e.ang)*ER;
    for(let i=0;i<sub.length;i++){const s=sub[i];if(Math.hypot(s.x-mx,s.y-my)<ER*0.55){sub.splice(i,1);e.busy=0.5;break;}}}
  // products
  for(let i=prod.length-1;i>=0;i--){const p=prod[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)prod.splice(i,1);}
  // draw enzymes
  for(const e of enz){ctx.save();ctx.translate(e.x,e.y);
    ctx.fillStyle=denat?'#ff6b6b':(e.busy>0?'#3ad6c6':'#2ec4b6');ctx.beginPath();
    if(denat){ // wobbly closed blob
      ctx.beginPath();for(let a=0;a<=Math.PI*2+0.01;a+=Math.PI/12){const r=ER+Math.sin(a*5+now/200)*6;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();
    } else { const mh=0.5;ctx.moveTo(0,0);ctx.arc(0,0,ER,e.ang+mh,e.ang-mh+Math.PI*2);ctx.closePath(); }
    ctx.fill();ctx.restore();}
  // draw substrates
  ctx.fillStyle='#f6a623';for(const s of sub){ctx.beginPath();ctx.arc(s.x,s.y,SR,0,7);ctx.fill();}
  // products
  for(const p of prod){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='#8ce99a';ctx.beginPath();ctx.arc(p.x,p.y,9,0,7);ctx.fill();ctx.globalAlpha=1;}
  // rate
  events=events.filter(e=>now-e<3000);$('o-rate').textContent=(events.length/3).toFixed(1)+' /s';
  requestAnimationFrame(loop);}
init();upd();requestAnimationFrame(loop);
setTimeout(()=>$('loader').classList.add('hide'),300);
addEventListener('resize',()=>{resize();});
</script>
</body>
</html>
